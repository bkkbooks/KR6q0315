body:
  text: 頌古世尊拈花靈山一會善隄防蠱毒之家水莫嘗迦葉無端霑一滴至今猶自面皮黃女子出定古老相傳鬼呌坑看來人鬼不多爭早知鬼便是人做夜半三更也可行賓頭盧親見佛來君王一語出如綸尊者眉毛八字分四海風清煙浪靜碧天無際水無垠梁武帝請傅大士講經大士錯解注志公錯注解臭肉積屠門堪笑無人買那吒太子析肉還母析骨還父雨散雲收後崔嵬數十峰王維雖敏手難落筆頭蹤居一切時不起妄念春生夏長淡飯粗茶魚投臭水彩奔齪家六祖風幡地神歸地天神歸天殷勤奉送寶馬金錢馬祖升堂百丈卷席一柄無情雪刃刀當鋒誰敢犯秋毫馬師父子親提掇血噴千山風怒號馬祖與西堂百丈南泉玩月諸子生涯各有成從來孝順兩邊生貪歡一夜渾家樂失曉連忙打五更日面佛月面佛日面月面突出難辨擬欲擡眸空中兩片即心即佛金毛獅子生鐵稱鎚渾崙無縫切忌針錐廬陵米價衝開碧落松千尺截斷紅塵水一溪飽食高眠人不到日從東出又沉西石頭問長髭大庾嶺一鋪功德成就也未南嶽峯前老石頭憐兒何事不知羞為人點眼長伸腳直至而今懶不收藥山久不上堂鋪席宏開見也麼買人何似看人多十成好箇吹毛劒只作陶家壁上梭藥山坐次僧問和尚兀兀地思量箇什麼山云思量箇不思量底僧云不思量底如何思量山云非思量兀兀地思量無可得思量無可思量處真箇好思量大庾嶺頭逢六祖鼇山店上見曾郎龍潭送天皇餅持來送去樣團團覆陰兒孫義不寒何似當時休擘破渾崙留與後人看趙州親見南泉蘿蔔從來出鎮州城南門外水東流饒君説得渾相似須是親曾到地頭趙州洗鉢盂二千載巖前樹曾無刀斧痕羚羊才觸著滿地葉紛紛混成一氣周行四時惟天為大惟堯則之趙州訪二庵主閃爍旌旗驟往來幾人遙望起疑猜此時若得樊公腳一踏鴻門兩扇開婆子偷趙州笋驟馬加鞭上酒樓何如坐地看楊州是非長短俱裁了鼠竊終難似狗偷趙州勘婆臺山路上箇婆婆平地無風起丈波下却斗門通底閘更無一滴到黃河溈山普請次有一僧聞版聲呵呵大笑而歸風前一曲動離愁那箇行人不舉頭手把花枝半遮面不令人見轉風流溈山同僧樓上看雨分明指出與人看多少禪和被熱瞞舉目只知看雨勢不知秋水沒欄干劉鐵磨到溈山溈山云老牸牛汝來也共樂升平道泰時相逢終不展鎗旗隨宜淡飯清茶外困臥間行幾箇知仰山插鍬賊火相逢恰五更見成贓物不須爭暗中多少都分了天曉依前各自行清稅孤貧乞師賑濟銅公塘鐵奉化得人憎得人怕不是明州人定説蘇州語洞山萬里無寸草處去洞山平地露尸骸庵主將身一處埋狼藉髑髏相枕藉悲風愁霧不勝懷大隨蓋龜骨褁皮兮皮褁骨大隨放出遼天鶻東西南北謾擡眸不知已過新羅國廓侍者問德山從上諸聖向什麼處去頑皮老虎臥林丘一任傍人放滴油滿肚只因曾飽肉縱加呼喚懶擡頭巖頭起滅不停起滅不停誰解看當機一拶透重關東西總是長安路蕩蕩無拘自往還僧問石霜咫尺之間為什麼不覩師顏霜云我道遍界不曾藏僧後問雪峰遍界不曾藏意旨如何峯云什麼處不是石霜僧回舉似石霜石霜云這老漢著什麼死急玄沙山頭老漢蹉過也同舟共賞洞庭春終日徘徊柳岸陰却得漁人加櫓棹等間抹過碧波心地藏種田博飯喫二一片荊山璞分明辨者難幾人偷眼覷只作石頭看種田博飯喫飽臥長伸腳把將三界來安向左邊著引得龍牙老古錐手裏把柄破木杓國師三喚侍者一擲神杯定吉凶再占重卜轉靈通分明見了今年事却説明年事不同漸源吊慰夢裏思歸問故鄉明明説與尚徉狂白雲盡處重回首無限青山對夕陽盤山聞歌郎紅輪決定沉西去未審魂靈往那方哭慟一聲無處避擢頭親見本爺娘僧問天章寶月禪師如何是佛法大意章云一年三百六十日便與麼去時如何迢迢十萬未是遠一年三百六十日日日日從東畔出昨夜黃昏又落西茫茫無處尋蹤迹皓老布裩襟誇富貴賤賣赤窮殺人可恕無禮難容僧問谷隱慈照和尚如何是道照云臘月三十日臘月三十日開口便為勑更擬問如何明朝正月一僧問古德如何是和尚深深密密處古德下禪牀作女人拜云謝子遠來無可祗待深深親下拜三代禮全該此意如不然玉帛云乎哉山前麥熟也未大匠不巧大儒不學動輒中方圓舉皆成禮樂堪笑鄉村賣卜人徒勞鑽破烏龜殼人間無水不朝東黃河因甚向北流黯淡灘黯淡灘十隻船來九隻翻惟有三山陳上舍我向陸地裏行看你奈我何僧問大龍色身敗壞山花似錦水如藍突出乾坤不露顏曾踏武陵溪畔路洞中春色異人間偈頌花光十梅懸崖放下萬仞崖頭自放身始知花發不干春更從箇裏尋枝葉笑倒當年樹下人絶後再蘇孤根脫落偃蒼苔冷地無端笑眼開莫怪雪霜欺不得只因曾向死中來平地回春萬木千花凍未醒東君無處覓歸程擡眸忽見春風面的皪枝頭數點青淡中有味半開半合榮枯外似有似無間淡中自是一般風味別笑他紅紫鬪芳叢一枝橫出莫謂南枝能放花傍分北秀亦堪誇黃梅不用爭高下草本傳來共一家五葉聯芳花開五葉自芬芳欺麝欺蘭別是香傳得靈根元不朽豈惟流落在花光正偏自在花合花開有正偏不完全處却完全要知根蒂從何得多見生埋洞水邊高下隨宜樹有高低枝短長花開隨處恰相當都緣妙得毫端趣豎抹橫拖總不妨幻花滅盡花分枝北與枝南向背橫斜有許般何待支郎強描邈開時便作謝時看實相常圓黃底自黃青底青枝頭一一見天真如今酸澀都忘了核子如何舉似人朝陽穿破衲橫片豎片胡亂搭長針短針信意聯但見日頭東畔出不知塵世是何年對月了殘經入海算沙徒自疲風前月下幾攢眉即今休去便休去欲覓了時無了時入已還閉南方經歷幾雲煙收得珍奇貨滿船彈指便風帆到岸一時翻作大光錢懷古空山寥寥黃葉蕭蕭斯人不來兮暮待之以朝斯人或來兮兩無語而意消歸去也衣飄飄路迢迢誰同其孤標月在青霄四威儀山中行移步放教輕無別意恐他幽鳥驚山中住落葉不知數無人掃翳却松門路山中坐習間成懶墮少獻花但見猿偷果山中臥不知時節過雨打窗好夢都驚破次建康留守趙龍圖雷音堂韻晴空霹𮦷絶追尋聽者須教辨者瘖坐斷封疆行正令逈然超越去來今底事明明不用尋通身有口却如瘖笑他盧老能多事龍圖語引蔓牽枝誑古今居士門高幾萬尋曾聆一語警盲瘖誰知千里同風事歷歷分明在目今次平江知府鄒編修韻并引博道者自西州持一杓惡水來潑老僧育王借渠杓柄連潑兩潑既是道中人必不發惡也曹溪平地起風濤後代船高水亦高寄語隨流入流者更須拋却手中篙曾駕鐵船驚海濤想應不怕浪頭高鄞江一滴渾無有切莫妄傳深幾篙次長沙趙督相送惠首座韻行腳親曾到地頭固知不是等間遊歸時有問五峯信為報龍囦已絶流絶流之句許誰知獨有毗耶老古錐非是望梅圖止渴調羮已熟向南枝次韻題大梅常禪師塔馬師問處沒蹤由或示三冬話九秋認著即心心即佛一絲頭是一絲頭茫茫摘葉與尋枝獨許山翁親見伊點著直行三萬里至今腳迹少人知視死生如遊戲場固知老子不曾亡祇今何處問消息風梅花撲鼻孔寄雲居掩室和尚鷲峰雲散霜天冷南北東西片月孤喜得江湖好消息點胸尊者在雲居幾回夢到白雲顛欲往難禁懶病牽何日相依傾倒夜月寒千嶂一聲猿從來有口挂虗壁誰信如今口亦無因記通身紅爛客無端白紙強塗糊少室塵蒙虗壁冷蕭蕭未厭家風太寂寥門外依前積深雪不知誰肯立齊腰止翁萬法都盧歸一法一法不知何所歸肚飢買箇油𩝐喫喫了油𩝐肚不飢石田紛紛多是競膏腴確實誰能下一鋤幾見萌心還懡㦬只緣無處著工夫別浦東海西邊西海南蘆花裊裊水漫漫謝郎猶自不知處莫作尋常洲渚看高原佛祖仰望不及處暗通一線幾何深冰嚴雪冷無人會空瀉斷崖千萬尋死翁一驚塗毒鼓脫爾喪全軀誰信髑髏上重生頷下鬚復古麥已登場稻滿田蕢桴土鼓樂平平不知將謂羲皇世元是天開寶慶年雲谷或卷或舒多變態隨呼隨應發天真誰知路轉峰回處幽鳥啼芳別是春枯木不入樵夫手不登郢匠門只麼老丘壑且無刀斧痕無際儱侗復儱侗平夷更平夷伸手不見掌趙州東院西訥堂德山無語歸方丈象骨低頭入草庵大鵬一舉九萬里籬邊𪈏空呢喃淈𣸩抓頭忘癢處弄物不知名一箇無分曉千金買不成常覺暫時不在還同死徹底惺惺亦自瞞長愛東村老婆子逢僧也解道和南琴枕巧出焦桐樣淳含太古音多因和夢聽只作夜蟲吟跛翁平常行一步却不墮平常盡道腳長短誰知腳短長臭庵全無氣息直是薰人無鼻孔者方堪與鄰次野雲南和尚雪竇錦鏡韻萬象融一奩九色猶未多圓淨出良範羅紋非巧梭有樣不可製無痕安用磨試問光影亡如何復如何送趙龍圖歸四明昔年曾約歸四明綴鉢共莆菜羮東園蔬薺幾衰長望之何以辜斯盟鏗鏗小節何足拘大名當振聲谹谹旌旗不動勦胡種屈伸一臂逾長城淮甸既肅四海肅豐功盛德應難名了知八珍與䔧莧清間富貴但等平我罹劫火固無悶公視晝錦不以榮七佛承承竟何據六祖忉忉空碗鳴君不見剎竿頭上鐵龍頭鴻毛至重山嶽輕六祖七佛乃龍圖語送無相和尚歸鄉同名同號同桑梓同住江湖亡彼此有時同上孤峯巔有時同下滄溟底苦同憂樂同喜金博金兮水洗水有時捩轉鐵面皮心口全然不相似你若住兮我即行你若行兮我即止白日青天轟怒雷平地無風波浪起非不非是不是西川大隨桐城投子送訥堂和尚住秀之天寧蘇州有常州有真箇有未嘗有賤時傾國不可換貴則陪錢掗一斗伸一手縮一手日月奔忙山河倒走濟北瞎驢退三步跛腳雲門大張口阿呵呵只今此話大行何待三十年後送率庵和尚住雲居東湖水深蟠老龍晨昏出沒無定蹤開口合口噴香霧舉足下足生陰風而今改宅雲居去威風萬竅聲號怒謂言不是抉珠人未應輕踏甌峯路送凝藏主歸蜀凝藏主五載惡相聚我既橫點頭公亦未相許就中猶叵耐拗折露明柱似此拙去就端的不可恕蕭蕭九月風露寒忽來告別還鄉去臨歧可煞沒巴鼻却要就我覓轉語一轉語如何舉濕紙褁大蟲大棒打老鼠阿呵呵無你會處送曇藏主雪峯見癡絶前佛隴世上有蛇皆可弄南山鱉鼻不可動動著冷口暗傷人傷人至死未知痛子今去也當自著便宜後日毒遭一口歸來莫道山僧不曾説與伊送姪昭上人歸鄉昭昭靈靈是何物非物非心亦非佛五湖雲衲競頭參空把光陰恣埋沒我遊江湖三十有四年飽飯之餘一味間打眠子今迢迢苦尋討不知尋討何慕焉問吾道今年大熟收成早問吾禪秋林噪晚聲喧喧抖擻屎腸都説了莫將一字歸去容易空流傳斯言寫就相違別目斷家山雲疊疊我亦欲歸歸不得千里萬里一條鐵林泉野人樂哉林泉人自得林泉趣渴則掬泉飲健則穿林去幾見幽鳥啼黃葉聚薰入奏雪飛絮四時適吾意萬象為吾侶有人更問意如何笑指巖前大松樹阿呵呵快活快活有甚討處再鑄粥鍋不解多方錮鏴成一鎚打破與重烹等間脫體離窠臼煮粥依前不是羮大芙蓉接待水雲何處覓行蹤踏破天台鴈蕩峰腳力盡時消息在小芙蓉接大芙蓉寧海接待煙波盡處良田闊歧路窮時活計新南北憧憧故多士不知誰是飽參人雞鳴接待水雲遇夜須投宿飯飽何妨又進程山主豈徒開接待養雞意在五更鳴元道士前玉隆知宮黃衣捨去混緇衣棄却甜桃摘醋梨酸澀一時嘗過了攢眉歸去許誰知淨道士伊豫頭腦不相似鼻孔由來只一般冷地自家親摸著老君元戴楮皮冠相士𥻘皴一塊爛枯柴幾見春風長緑苔豈謂先生也相許驢年決定放花開無方刊字道在貴亡羈寧容滯一涯是山皆有石隨處可鐫讚佛祖釋迦出山相入山去何所圖出山來胡為乎早知今日事悔不慎當初觀音大士提起數珠呈伎倆無端弄出孩童相何似月明霜滿天孤猿啼斷千峰上隨流入流無所分別處處圜通頭頭漏泄雲淨八紘天宇寬萬頃波心蓮一葉寂滅現前如月在天分身利物影含百川是所謂不然而然虗而通靜而應萬國春容千江月影如今何處求普門一聲鶴唳寒松頂大哉觀自在善觀諸音聲而於諸音聲不作音聲見是見亦寂滅亦無寂滅者由是離衆苦處處得解脫分身十方剎救度於一切然於救度中而無救度想如春在百花不分長短枝又如月在水不分大小器尋聲隨所念平等獲利益是三十二應十四無畏法無量方便門一一皆成就一一成就處當體皆如幻我觀如幻相願作如幻讚若有見聞者當作如是觀漁婦觀音腥穢通身不自知更來漁市討便宜就中活底無多子提向風前賣與誰籃內魚衣中珠見買見賣少實多虗文殊大士為龍女説法泰首座請讚文殊所法所説何法女子成佛所成何佛無法可説無佛可成臥龍奮迅獅子嚬呻三教合面相一三三一三一一三解不能散聚不成團今古合成閉口面只因門尸有多般十六羅漢身如枯柴心如斷崖萬般神變一種平懷面面相看究竟不知論底事阿耨達池龍王來日請佛齋須菩提頭白齒豁空腹高心被憍尸迦當面上當對維摩詰甘自屈沉説甚解空稱第一只堪倚杖獨沉吟布袋露𮌎坦腹皺眉搭觜做箇模樣是何儀軌謂渠惺未必惺請渠睡未必睡吽吽奉化子我儂識得你肉重千斤智無半星回頭轉腦昧却天真一處尤堪笑街頭等箇人我當時若見只緩緩地向他道謝三娘稱銀誰管你地誰管你天放下布袋打一覺眠若論當來補處驢年更待驢年巡行掠布既飽且醉無用心處打箇噴嚏更言是真彌勒想見別有假底維摩居士詐病從來不可醫文殊特為下針錐事褫一長三尺問著依前似鼓槌示疾毗耶平地風波醫不得處病在口多達磨祖師大破六宗單傳一心遊梁歷魏罕遇知音少室九年空面壁誰向同霜夜月沉沉滿面盡是胡鬚當門却無版齒縱不畫影圖形東土有人識你觸忤梁王恓恓渡江九年冷坐重重話墮一花五葉自芬披不在春風著意吹祖師圖等是清平世界人多因間事長無明使他箇箇能安分圖上何緣有姓名豐干淨土不居居穢土良馬不騎騎猛虎回頭轉腦謾招呼誰肯與伊為伴侶寒山持經拾得手接手持經卷付與同倫己所不欲勿施於人自有一經不肯受持却從他覓可煞愚癡蜆子出手露腳撈蝦摝蜆這窮鬼子可貴可賤紙錢堆裏謾藏身莫言冷地無人見溪尾溪頭打野盤撈蝦摝蜆當朝餐想應不是釣鰲手得箇蝦兒便喜歡金華聖者飽啖豬頭肉長齋不喫素莫言滋味別要且少鹽醋吽吽大有著你處端獅子要弄便弄要置便置眼睛倒轉眉毛踢起雖然好箇金毛爭奈爪牙未備普化恣意放顛放呆走遍前街後街就中一處叵耐大悲院裏有齋泉大道這瞎禿無撿束浴龍湫繫蛇腹飄裏酒鉢裏肉到頭底事若為論郴州城中六月六郁山主收得蚌蛤珠誇張無價數我儂不怪他他是村山主言法華褰裳而趨或然而住咄咄書空喃喃獨語盡語渠儂轉法華知得身心在何處鳥窠佛法有些子言中設網羅布毛吹起處依舊不離窠臨濟善戰不動旗鎗善縛不加繩約其毒猶恆山之蛇被傷者決定無藥竊不見蹤敗不見贓是真白拈其誰與當晴空轟霹𮦷官路栽荊棘沒興遭逢著前凶後不吉忠道者聽教一味瞌睡參禪不入爐冶盜橘過於揮劒騎虎穩如乘馬伎倆元來箇樣生幾乎喚作忠道者靈照女有髻垂肩無鞋磹腳一掬精神十分銷鑠最苦拈來潑籬風前索價無人著常不輕童子作佛名何佛不輕成自輕誰知眼睛裏箇箇有瞳人豐干寒拾虎四睡善者未必善惡者未必惡彼此不忘懷如何睡得著惡者難為善善者難為惡老虎既忘機如何睡不著題巖寒拾五峰路上雙澗寺前藏頭露面撫背拍肩舉筆欲題題不得斷崖千仞鎖寒煙圜悟妙喜侍立坐底是誰立底是誰兩枚漆桶一種無知非惟咈詬啒㖀恣意鳳林吒之壞盡東山窮活計都因這漢兩爺兒大慧僧中之龍法中之王讚不及處衡陽梅陽破庵為即庵讚噫嚱吁何人歟無德可敬無言可書非橫滅族是真瞎驢有口不能罵得捲而分付雲居生平蕭散渾無羈絆奮惡拳頭打會禪漢我嘗一見口似匾簷凡侍之者莫知其幾往往瞪乎其後終莫得其畔岸是故不可毀不可讚至於不可奈何但如今必要知其所竊之羊謾去西邊屋角頭蜂桶裏尋看無相祥長老請讚重如山靜如水輕輕觸著雙眉剔起這般漏綻許誰知分付天章破家子孟保相澄之不清混之不雜融融淡淡辛辛辣辣徑山橫讚豎讚終是讚之不著但以手加額道箇南無大慈大悲救苦救難殺人不眨眼底觀世音菩薩自讚鄒編修請讚骨稜層髮鬖且不安分更説指南置須彌盧於一針鋒貯四大海於無底籃不知世有誰知己朴庵彰聖輝長老請一之上三之下有來由無縫罅是甚牛溲馬浡剛自遼天索價纍及兒孫成話興化益長老請益無所益為無所為逈超玄化杳絶機宜桃紅李白自芬披問著東風總不知定慧圻長老請詐啞徉聾指西作東肆無所畏説大脫空彎弓曾發蓬蒿箭射中南山白額蟲延慶日長老請不愛人讚不怕人謗令是一條筋見者難近傍要識渠儂端的日在東山之上倫侍者請見住瑞岩見假像真弄真像假裂破面門非驢非馬世上有誰親見來天台方巖倫侍者東林日長老請無德可崇無善可從近之不吉遠之必凶傲慢釋迦文説甚臨濟宗誰知目視凌霄外意在廬山五老峰覺際融長老請無箇模樣畫箇模樣既有模樣是甚模樣節節危梁十二層垂垂白髮三千丈曹山矩長老請頭圓象天足方象地耳朵聞聲鼻孔出氣馬駒踏殺天下人瞎驢不受靈山記洪長老請西有岷峨南有雪峰靈龜未𪹼爻象重重拈却玄沙白袋自然千里同風永壽礎長老請怒罵當慈悲脫空成善巧三錢買李子偏向赤邊咬如今此話許誰知永壽破家真種草因大師請不是神不是鬼突出人前是何面觜妙因等間覷破扣齒擎拳頂禮唵蘇嚧蘇嚧㗭唎㗭唎日本琳上人請頭拄天腳踏地大宋國裏鼻孔日本國裏出氣覺琳持此歸故鄉大似波斯入閙市禪人請讚似牛無角似驢欠尾突箇形容誠難比擬無所思無所為臥月眠雲誰得知眼裏沒瞳人鼻頭無孔竅單賣赤髮綜鬼見拍手笑世有愚癡箇樣僧難為名字上傳燈人道脫似我道不似口少四方眉欠八字不是普豐清上人定應喚作王蠻子鬚髮蓬鬆眼孔定動解拈死貨手頭活弄觸著梧桐老樹樁等間驚起丹山鳳這瞎賊無羈勒指槐罵柳將南作北橫也湊他不得豎也湊他不得誰知籮裏生薑元是井中侯黑僻性拗木枕天生沒意智自己獨冤家佛祖間奴婢嘗聞一飽忘百飢今日山僧身便是大不可忽細不可欺丘嶽之崇起於毫釐善惡之積發乎隱微洞徹根源逈絶機宜可以拈一塵融十虗以無遺小師德輶請喜一上怒一上少機關足伎倆硬把虗空量剛道有一丈似這般會算底本師如何喚作無準和尚德義請義出豐年儉生不孝自古自今豈容師教義兮義兮知不知官稅了兮何用鈔德濬請踞胡床握麈尾默默自問誰家之子寧可併喫五斗醋不敢説著東山下左邊底小佛事為天童無際和尚起龕大海渺無際漫天鼓黑風悠悠煙渚客到此盡迷蹤故我無際和尚慣諳水脈一生鼓棹揚帆不犯波瀾收盡錦鱗紅尾掃去今時途轍全提向上爪牙功魁佛祖而不居聲震雷霆而難掩化緣既畢一笑翻身天無四壁地無門畢竟真歸何處去東家作驢西家作馬要騎便騎要下便下負鞍㗸鐵當生涯佛手明明不可遮為靈隱妙峯和尚秉炬來也如是浙東山浙西水去也如是七十三八十二來去一如普賢文殊清風萬里擡腳不起這箇是妙峰和尚臨行得力句子諸方已為饒舌雖然雲月是同徑山更與一決且作麼生決擲下火炬云鐵作肝腸也須迸裂為印西堂秉炬塗毒小師塗毒一震遠近皆死親聞者誰松庵老子所謂如是證入如是踐履窮萬法之根源徹千聖之骨髓至於出沒死生之際如同遊戲而已然雖與麼爭奈命脈猶在徑山手裏且道把住則是放行則是木生火土尅水為擇維那秉炬蘇州有常州有兩兩未為雙三三不成九分明抹過威音前何須更問涅槃後正恁麼時如何通身無寄赤條條破屋從教野火燒為一維那秉炬去却一拈得七無孔鐵鎚當面擲拏著便行千萬里南北東西絶消息消息絶火裏烏龜嚼生鐵為開上座秉炬生從何來鐵樹花開死從何去雲收嶽露去來生死兩俱忘火自炎炎風自涼為開上座秉炬昨日茶毗開上座今又茶毗開上座匆匆各自奔家鄉先行後行俱蹉過不見道開不能遮勾賊破家勇而能斷只得一半舉火炬云聲前火急要君看會麼秦時𨍏轢鑽為覺上人秉炬迷本無迷覺亦非覺才涉絲毫病如山嶽且膏之上肓之下如何發藥擲下火炬云擬不擬便著為海觀上人秉炬觀大海者難為水窮盡煙波一漚爾如今漚滅無可觀回頭喪盡自家底一不成二不是白日青天火把子為足知倉秉炬平生萬事足知足常自足所欠惟一死今朝死亦足生也足死也足種種足無不足且如何是足底事泥揑金剛水底行紙畫天神火中浴為欽上座秉炬以火炬打一圓相云不是心亦非佛究竟名何物若謂死生只這是欽師猶被馬師惑如何得不惑去天色正嚴寒只宜燒榾柮為埴上人秉炬身心一塊爛泥團幾曾經歷陶家手雖然不假埏埴功其器須知已成就昨夜無端打破坯模大地山河一時出醜正恁麼時如何冰蠶水底行神龜火裏走為聞上座入塔某人聞聞聞不聞不聞聞不聞不聞透得這四重關了便知石頭大底大小底小春融百鳥喧雲淨千峰曉為法清上座入塔是法非思量分別之所能解離念清淨乃能證入若果能證入則森羅萬象四大五蘊根根塵塵悉皆清淨指骨云只這箇豈不清淨既然如是不得動著元處安著序跋跋大丞相遊公所書心經此經吾佛以覆大千之舌所説句句皆心語也大丞相以運造化之手所書字字皆心法也燈既能受持則知古佛今佛無二心爾跋圓覺經集注喚作圓虧缼了也道箇覺迷昧了也黃面瞿曇十二大士密説顯演已是注解其餘經師論師於注解中又添解注且正文畢竟在什麼處恁麼問好與三十拄杖覺如居士儻能下手徑山甘受不辭費居士請諸山書金剛經得最後一分仍命跋若謂如來有所説則為謗佛若謂如來無所説則為謗經這裏著得一隻眼瞿曇善現無地容身其或不然非但諸山乳峯亦遭連纍跋能凝範三人讚十二散聖這一隊賊非常敗迹有贓者五無贓者七已經三司明斷於中一人受屈屈者重加一等唵部臨唵齒臨急急其餘並在不赦嘉定十年臘月二十五日結跋船子和尚頌後船子上無片瓦下無卓錐安有剩語流布藂林是皆傳之者誤而賡歌讚之者亦誤矣今又兼行於世豈不轉誤後人耶徑山從而注腳也是蕭何制律跋圜悟法語警誨學徒筆授之語盛於圜悟祖師其縱橫之作如大藥肆窗窗洞開奇材異品牛溲馬浡插架盈橱貴賤粗細莫不有也拈起一物皆能殺人亦能活人中間誤服食者往往致病然非藥之咎也敏既能寶之宜諦審之跋大慧法語大慧禪師得法自在譬如川流泉源其勢就下浩然無涯或激而怒或決而汛或恬而靜或暴而吼變態萬狀初無作意及至于海則混乎一味而無川源泉流之異修羅蚊虻隨器而飲皆得充滿若酌一蠡自謂盡其大海之量非愚即憨跋雲窠語録雲窠入滅未久有不肖子摘其平生敗迹之欵成一巨軸將欲流布諸方以肆無窮之謗且携質於子曲求知證因為原其語倣佛橫巾右祖之作然又節節誵訛不通翻譯於中有一句子稍似唐言若人辨得直饒刎頸未足謝諸儻涉遲回清涼贏得鼻孔出氣跋念鐵觜語録此老平生無所重惟畜一喙勘驗諸方故其所至一時大老無敢嬰其鋒由是鐵觜之名大播江湖後住吳門金芝小剎有古宿風韻學者過其門或以別傳機要及異教之語扣之隨扣而成頌如谷答響其徒托其緒餘欲流通於世且要雪竇剩語因謂從上佛祖切害處痛遭一觜不可禁當後之覽者亦宜善看方便跋嘯巖語録嘯巖一嘯豈止聞四十里直得三千剎土悉皆震驚猛獸竄伏飛禽墜落非雷霆之所擬今既滅矣餘音尚存殷殷谹谹殆不可掩眼裏聞聲者當自甄別跋少林語録少林有一句不在六會語中若人辨得便請焚却此録其或不然始自篇首至於卷末滿紙盈册總是黑豆子不妨從頭咬看忽然蹉口咬著也不定跋石巖語録瑞巖緣姪以石巖兄語一編見示且乞余序語余與石巖兄固善然迦葉三昧阿難不知則吾石巖兄三昧余豈知之耶後人欲知其三昧不可無此録然不得於此録中討若人知得潮陽有鰐魚跋石田語録吾父翁活業為石田兄破蕩無遺今觀前項所供皆是詣實至切害處不覺咬斷拇指跋大歇語録拈上死柴頭且向無煙火老松源擅楊歧斯旨噓而發之大行於世所至龍象如林得其要者吾大歇兄耳今觀其録雖一螢不耀而冷焰逼人尤甚於燎原之酷覽者宜退身七步跋大慧出隊歸止知事頭首出迎手帖此是大慧退間時帖既言省緣又言省靜觀其恁麼寫出大故不省也余持鉢江鄉純上人持以覓語奔走中為書當與大慧併桉跋破庵法語破庵老人書此法語日恰在侍傍是時不覺惡心嘔吐而去經今數十年豈謂復有寶之者我所不解跋癡絶書石田語石田供來句句不實癡絶寫出字字誵訛然上項事於劣弟即無干預恐後難以分説書此為憑跋無庵語孟少保無庵語質而不文閲者如喫木札羮然舌頭具眼底自有真味書楊省元學道論此書乃五里單牌十里雙堠也登徒欲詣之人不得不一觀楊公慮其半途而暮者故求剩語於後以速其行雖勉強而作但恐翻成鈍躓也枯禪序今時師僧往往禪多病在乾不盡處非特貫乎形色作乎四肢至於八萬四千毛孔皆咂咂地動輒流出莫之能遏求箇脫枝葉絶氣息底有若星中揀月成上人深諳此旨故以枯禪自名亦虗空釘橛耳且欲無準饒舌豫平時不曾與人葛藤況枯禪分上豈容葛藤耶成遽而咄曰已是葛藤不少徑忍笑書以遺之跋闡提頌軸性上人以闡提為稱其大旨已見於柏庭友于之作袖軸亦欲求語因謂之曰老夫有一句子出之不辭但不知上人信耶不信耶與其信胡為闡提若不信則書之何益闡提聞之乃仰天掉臂長歌而去云飯一鉢兮香普薰臥連床兮堂七楹一句子也年已陳信不信兮自有人於是引筆呼之笑而為書跋弼知客山水軸破庵石田癡絶跋在前弼知客以山水小軸示余軸雖小而有無盡之意無盡之意不可形容不可形容處已為吾父兄形容矣徑山尚何言哉跋用庵軸後用不及處熾然用之熾然用時卒無可用如人夜間背手摸枕子用庵還甘麼徑山書于即庵後三年跋出化先馳頌軸淳祐五年秋余將率師出征于山之南拜玉為先鋒四方子弟各出奇䇿以助其行觀其意視其勢決有必勝必取之效後日奏凱回戈吾當片析太虗為賞有所不吝題牧牛圖誰家牯誰家犢溪東溪西水甘草足宜乎後夜當春耕懷袖應難祕斯軸題僧畫草蟲似則似矣是則未是若是刢利衲僧不作這般蟲豸大丞相遊公祭文維皇宗淳祐九年歲次己酉四月壬寅朔右丞相兼樞密使提舉國史院實録院提舉編修玉牒提舉國朝會要提舉編修敕令提舉編修經武要略南充郡開國公食邑三千戶食實封一千四百戶遊侶謹以香茗之奠佑昭告于故徑山佛鑑範公無準圓照大禪師之塔師起劒閣錫飛入吳覺性既圓聲譽甚都十有八年揮麈雙徑再幻樓閣一彈指頃出世間法非我所知自世間言誰能及之胡不百年續佛慧命使彼叢林知所取正尺書告別寂果樂邪遣一瓣香臨風嘆嗟尚饗
