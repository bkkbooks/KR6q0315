body:
  text: 維佛鑑老自蜀道來早與石田師兄同為破菴上足得句中眼秉梱外權險如劒閣崇墉壁立萬仞奪却梓潼如意截斷眾流自清凉過焦山由雪竇移鄮嶺業風飄轉驅來五頂峯頭宿債難逃爭奈西番劫火你諸人百般較計這些子一味癡頑瓦礫成堆楖栗杖依前橫竪工徒雜作金剛圈各自嚥吞凡五會問答舉揚被叢林勘驗不少順寂之前一月蒐揀而為臣編況曾信筆親書自甘招伏更引旁人作證忒煞周遮點檢將來有甚交涉祇恐旃檀林下展轉傳抄何如搕𣜂坑邊等閒拋擲且圖省事免起禍端然雖如是這一則公案畢竟如何合殺不見古人道陽燄何曾能止渴𦘕餅幾時充得飢勸君不用栽荊棘後代兒孫惹著衣咄淳祐歲辛亥月建丑日壬子滄洲道人程公許希頴霅溪寓隱西瞻堂書佛鑑禪師語錄目次序卷第一慶元府清涼禪寺語錄鎮江府焦山普濟禪寺語錄慶元府雪竇山資聖禪寺語錄慶元府阿育王山廣利禪寺語錄卷第二臨安府徑山興聖萬壽禪寺語錄卷第三小參法語卷第四普說拈古卷第五頌古偈頌讚佛祖自讚小佛事序跋祭佛鑑禪師文卷第六奏對錄行狀
