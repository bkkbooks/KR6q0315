body:
  text: 住臨安府徑山興聖萬壽禪寺語錄侍者普明了南紹曇等編指三門廣大樓閣門戶不扄了事衲僧未行先到且到後如何眼不見為淨佛殿天上無彌勒人間無釋迦燒香禮拜誰遂燒香云唵摩尼達哩吽㗶吒踞方丈前佛性命後佛紀綱總被斯徑山今日一把把定直得盡天下衲僧無出氣處莫有不甘底麼拍禪牀云果然拈勑黃從上來莫不貴重這一著子直得不言而化不約而同風從虎兮雲從龍指法座召大眾云便恁麼委得暢殺五髻峯儻或躊躇且行雙徑路陞座祝聖罷問答不錄乃云靈山密府釋迦老子面皮黃少室單傳達磨大師無版齒聲前得句意外明宗透過是非關不住羅籠表便可十字街頭橫三豎四孤峯頂上嘯月眠雲的的無私頭頭有據以此弘濟大法以此仰助教風豎抹橫該七穿八穴正恁麼時如何千峯朝華嶽萬派肅滄溟敘謝不錄復舉世尊陞座文殊白槌云諦觀法王法法王法如是拈云大眾幸自好一片無瑕白玉却被文殊一槌打作百雜碎直至如今収捨不上然雖如是不因樵子徑爭到葛洪家當晚小參直下便是劃地為牢別討生涯鑿空求縫恁麼也不得不恁麼也不得飜身一躑抹過太虗只此靈鋒阿誰敢擬能縱能奪能殺能活無高無下無黨無偏一切處不留一切處成就拍禪牀云不知世有誰知己相共扶持折脚鐺復舉三聖問雪峯透網金鱗未審以何為食公案拈云軟底不奈硬底何硬底不奈軟底何然雖如是點撿將來未免一得一失具眼者辨取謝兩班并萬年西堂至上堂釋迦出世一時文殊普賢觀音勢至金剛藏彌勒大士佗方國土諸大菩薩聲聞緣覺悉皆畢集莫不各務本事助佛揚化轉大法輪如百川赴海同歸一味山僧此來新住徑山亦有知事頭首大眾耆舊諸方來者大善知識各出一隻手作成保社扶豎正宗然於中間要且你不識我我不識你彼彼不相照各各不相知你若忻忻我即不肯且道因甚如此義出豐年重陽上堂召大眾云去年底今年底輙莫明年更明年年年只如是黃花爛爛醉重陽落葉蕭蕭愁滿地諸人還會麼以拂子擊禪牀云吾無隱乎爾開爐上堂僧問初冬時節又相催浩浩諸方爐鞴開獨有徑山文武火不知煨殺幾人來如何是徑山文武火師云切不得動著我香匙火筯進云只如趙州道三十年前南方火爐頭有箇無賓主話未曾有人舉著此意如何師云舌頭拖地進云畢竟如何是無賓主話師云言滿天下進云只如玄沙聞得云這老漢脚跟未點地在又作麼生師云一坑埋却進云可謂焦塼打著連底凍赤眼撞著火柴頭師云一劃劃斷僧禮拜師乃云五峯門下三箇五箇衲被幪頭圍爐打坐鼻笑瞿曇平欺達磨又誰管你張三李六然雖如是諸方爐鞴正炎炎何似徑山文武火出鄉歸上堂若論此事如國家出師相似須是先鋒殿後俱得其人人無異志心無異用一往直前折衝千里然後戰無不勝攻無不取且奏凱回戈頓轡自樂一句作麼生道折弓放馬無餘事倚杖逢春點異花復云赤手空拳下山去滿船和月載歸來五峯可煞無慚愧面面相看眼未開何故窮坑難滿天童晦巖和尚至上堂同身共命同氣連枝阿難合掌迦葉揚眉就中一句子不許外人知且道因甚如此營裏天王謝保寧西堂掛牌及新舊都寺上堂說禪說道易成佛作相難又道成佛作祖易說禪說道難咄有什麼禪道可說有什麼佛祖可成更有什麼一絲頭許難易來然雖如是忙者自忙閑者閑上堂不寒不熱好箇時節黃鶯頻織柳絲烟子規猶哭松梢月佛殿脊被鴟吻咬殺則且置且道透聲色一句作麼生道良久云老不以筋力為能浴佛上堂指天指地弄精魂只為生來無腦門韶石一棒打不殺至今恩愛俱成冤正當四月八底事與誰論門外千峯萬峯啼斷猿上堂南北東西八百牛時來群聚五峯頭飢䬸飽臥松風裏晝不拘兮夜不収然雖如是爭奈鼻頭繩索總在山僧手裏有時一掣教佗去有時一掣教佗住且總不恁麼又作麼生擊拂子云今日費我多少草料謝西堂首座秉拂上堂萬年石橋三平石梁總沒交涉恰恰相當足陌見錢買賣一毫不用商量因甚如此南泉斬猫兒火後上堂劫灰飛盡見靈蹤突兀凌霄對五峯意在目前誰共委相同扶起舊家風端午上堂五月端午節底事不須說百恠盡潛蹤羣魔俱殄滅是則是且道無病之人如何發藥鄭州梨青州棗綿州附漢州薑邠州鐵卓拄杖下座入城歸謝宣賜上堂去時萬木含愁色歸日千峯展笑容此意此心知有自一爐香爇散天風上堂七月八月或凉或熱景色凄清蟬聲嗚咽觀音菩薩將錢買胡餅放下手却是饅頭拍膝一下云韶陽老人得一橛大內陞座及見施主歸上堂逾月走紅塵生涯隨處新逢人陪笑面接物強精神僥倖遇明主帡幪感重臣歸來何以報卓拄杖一下云只此謝堯仁上堂三分光陰二早過靈臺一點不揩磨貪生逐日區區去喚不回頭爭奈何古人併盡氣力只抓著徑山癢處山僧自罹劫火奔走紅塵歸來瓦礫堆中從事土水非但業識忙忙和鼻孔眼睛一時打失了也如今要作全人終不可得然雖如是家貧願隣富重陽上堂九日重陽節東籬賞菊花歌懽公子事淡薄野僧家雖然淡薄不妨別有滋味且道是什麼滋味膠膠粘粘黃栗粽苦苦澁澁茱萸茶上堂舉教中道彌滿清淨中不容佗又道云何是中更容佗物驀拈拄杖云這箇且不是佗物卓一下云豈不清淨你等衲僧家要行便行要坐便坐靠拄杖云切不得動著入城歸上堂十五日以前常在途中不離家舍十五日以後常在家舍不離途中正當十五日跛跛挈挈百醜千拙張都料李作頭鑿竅底鑿竅著楔底著楔雙徑來來去去人長安夜夜家家月謝兩堂首座秉拂上堂召大眾云山僧是箇實頭人愛說實頭話凡一切事據實而論前日兩堂首座秉拂所說法要一人全道得著一人全道不著道得著底堪與人天為師道不著底堪與佛祖為師若人辨得出自救不了若辨不出南州北州名字行却有何益哉水鄉持鉢歸上堂六月火邊坐三冬水裏走怒中呈笑面閙處伸毛手滿載沒底船歸來重抖擻且道抖擻箇甚麼卓拄杖云蘇州有常州有郡知府至上堂傾蓋相逢已成多事側鞭回首早涉繁詞須是恁麼人方明恁麼事恁麼人既在這裏作麼生是恁麼事旛竿頭上鐵龍頭復云達磨西來不立文字教外別傳且道傳箇什麼徑山久默斯要不務速說今日既遇知音不免破慳去也垂下一足云不是樸庵大難委悉佛涅槃上堂記得世尊涅槃日普告大眾云謂吾滅度非吾弟子謂吾不滅度亦非吾弟子師云滅度不滅度既總不是畢竟合作麼生諸人還見釋迦老子麼其或未然却聽山僧分明為汝指出遲日江山麗春風花草香泥融飛鷰子沙暖睡鴛鴦上堂拈拄杖召大眾云韶光去也誰能留長江袞袞無暫休人生既老不復少此心未了空悠悠或有箇漢出來道大小徑山猶作這箇語話卓一下云打草只要蛇驚浴佛上堂指天指地徒張意氣一棒打殺更無巴鼻徑山今日都盧放過且要一時腦門著地何故豈不見道禮之用和為貴上堂舉應庵示眾云三十三州七十僧驢腮馬頷得人憎諸方若具羅籠手今日無因到淨名師云應庵太師祖是則是太煞舌長徑山則不然數百禪和數十州襤襂破衲面搊搜諸方有道不肯學甘共山僧拽木頭上堂拈拄杖召大眾云今日四月十五結制之辰盡山河大地草木叢林情與無情盡在拄杖頭上安居禁足若凡若聖若青若黃長短洪纖各住自位不得動著候七月十五別有條章這箇則且置豎拄杖云你道這箇拄杖子吞却拄杖子不見有拄杖子依舊是箇拄杖子時如何卓一下云應當如是學謝兩堂首座秉拂上堂拈拄杖云前既無釋迦後亦無彌勒即今何所覩舉拄杖云見麼天台三百五十錢買得卓一下云賊賊中夏上堂拈拄杖云前半夏已往已難推究後半夏未來未可討論正當今日有箇現成公案諸人還斷得麼若斷不得且聽拄杖子斷看卓一下云乾三連坤六段破庵和尚忌日拈香楊歧設忌做盡鬼怪徑山設忌一無所解隨分淡淡薄薄點一盃茶燒一炷香謾禮三拜若謂報德醻恩兔子喫牛嬭上堂時節不相饒俄當七月朝未聞桐葉落已覺稻香飄泣露蟬聲咽迎秋鴈影遙有誰相共委突兀對凌霄解夏上堂諸人分上各各有一節案牘九十日內推勘已圓今當自恣既到山僧面前無有不了底事且畢竟如何決斷已結證未結證驀拈拄杖卓一下云大赦咸放出山鄉歸上堂黃面瞿曇昔持鉢入舍衛大城乞食於其城中次第乞已還至本處飯食訖収衣鉢洗足已敷座而坐召大眾云黃面瞿曇幸自可憐生無端被須菩提出來道箇希有直得七花八裂収捨不上徑山出鄉四十餘日今日歸來飯食已了衣鉢亦収了敷坐已了只是諸人第一不得出來讚嘆何故錢是足陌物有定價御書至上堂拈香祝聖罷趺坐問答不錄乃云須彌山為筆香水海為墨盡大地為紙吾大聖人以主天下之力秉此筆蘸此墨而於此紙大書特書縱橫得妙輝騰今古榮耀林泉以此侈吾佛之光以此霈神龍之澤以此莊嚴寶所以此成就福田吉祥中吉祥殊勝中殊勝正恁麼時如何報稱萬年正續四海樂無為臣僧師範恭奉聖旨特賜本寺釋迦寶殿妙莊嚴閣凌霄之閣靈澤之殿寶所萬年正續之院二十四大字宸翰臣僧領眾迎接歸寺永鎮名山陞于此座舉揚宗旨上祝聖壽無疆臣上感聖恩上感聖恩下情無任感天荷聖激切屏營之至復說偈云堯仁及物麗如春榮寵名山御墨新將底醻恩崇壽域碧天無際水無垠冬至上堂拈拄杖云過去也恁麼未來也恁麼見在也恁麼卓一下云一陽來復萬彚發生寒谷回春冰河解凍且道是佛法耶世法耶卓一下云非思量分別之所能解上堂摩騰入漢如將蒿枝攪四大海令一切鰕蠏魚龍知水為命達磨西來又如將鴆毒置於海中令一切鰕蠏魚龍飲者皆死雖然如是心不負人面無慚色浴佛上堂昔年當此日生箇老妖孽殃害大地人有屈無處雪雲門憤不甘一棒要打殺打不殺至今年年有箇四月八結制上堂徑山今日結夏不分上中下座徤則運瓦搬椽困則橫眠倒臥誰管你孔夫子李老君胡達磨何故善賈者不停死貨上堂佛之與祖是生冤家禪之與道是大妄語何故豈不見道冠者五六人童子六七人浴乎沂風乎舞雩詠而歸上堂拈拄杖云一切有為法如夢幻泡影如露亦如電舉起拄杖云拄杖子化作拄杖子吞却拄杖子則且置只如深沙神怒發將嘉州大像一摑因甚陝府鐵牛颯然粉碎卓一下云應作如是觀上堂七縱八橫處見得透徹寒灰死火時恰恰相當寒灰死火時體得分明七縱八橫處頭頭合轍所以道古今一貫聲色純真豎拂子云看看德濟龍王向這裏逞大神通降一陣卒風驟雨瀉向諸人面前還知麼若也不知却歸靈澤殿去也上堂古者道為學日益為道日損損之又損至於無損正恁麼時蜻蜓許是好蜻蜓飛來飛去不曾停捉來摘除兩箇翼便是一枚大鐵釘佛涅槃上堂舉文殊請佛再轉法輪世尊云吾四十九年未甞說一字汝今請吾再轉法輪莫是吾有所說法耶師云黃面瞿曇以油洗皂欲成素練豈可復得耶下座詣大佛殿普禮三拜和文殊一時領過上堂舉梁山和尚道南來者與三十棒北來者與三十棒雖然如是不當宗乘後來瑯琊道梁山好一片真金只作頑鐵賣了瑯琊即不然南來者與三十棒北來者與三十棒一任天下人貶剝師云瑯琊恁麼道瓜田納履未免嫌疑徑山這裏南來者搬泥北來者運土拔一毫以利天下吾不為也破庵和尚忌日拈香這箇老凍儂猛利如虎狼威凜萬壑風眼搖百步光我昔編其鬚脫命於毫芒至今數十載毒恨不可忘此世後世永永不願見臨風誓此一爐香出鄉歸上堂千峯萬峯濃潑眼十谿五谿深沒腰只有山翁喜相接聲聲慚愧與難消且道還有所得也無蝦蟆口裏一粒椒重九上堂黃菊新開剪剪金忻逢佳節興難禁臨高無語寫幽思拄杖為吾聊一吟卓拄杖一下云非但落韻兼錯平仄上堂二由一有一亦莫守文殊普賢泥猪疥狗上堂今時參學多是踏步向前道我參毗盧師法身主向上巴鼻格外玄機如渴鹿趂陽焰於自己脚跟下事往往蹉過殊不知舉步處踏著釋迦老子天靈蓋開口時觸著達磨大師祖諱要且無你在遮右掩處徑山恁麼告報還有猛省底麼咄用省作麼聖節上堂拈拄杖云天地之根萬物之主大千無以居其尊劫石難以並其固卓一下云直得森羅萬像草木叢林情與無情悉皆皷舞時哉時哉正月初五謝智首座惠後堂并新舊頭首上堂徑山一句子似有如無却須是箇具大智慧底領之於文彩未彰已前然後知大藏小藏盡從這裏流出至於或卷或舒或進或退靡不中的雖然如是可惜許中夏歸新僧堂上堂大凡參學先須自參直須識取自家本來底面目然後徧參遊人門戶升其堂奧坐其牀榻至於自受用三昧他受用三昧一時具足儻或倚佗墻壁看佗眉毛眼睫終非究竟既然如是且作麼生是自家本來面目良久云北人不相鼻南人不相色解制上堂道無彼我踏著不嗔用不停留了無轍跡翠巖東語西話著甚來由仰山種粟畬田翻成窠窟文遠於驢糞裏落節洞山向萬里無寸草處嚲跟這一隊漢一時裂下了也畢竟事作麼生拈拄杖卓一下云驚起暮天沙上鴈海門斜去兩三行謝新舊知事兩堂秉拂上堂衲僧家無本據動靜去留無非活路進一步臨機沒回互退一步聲色如聾瞽不進不退又且如何前堂首座是果州人後堂首座是蓬州人蓬州人自打蓬州鄉談果州人自打果州鄉談雖然如是君子千里同風出隊上堂拈拄杖召大眾云眾生擾擾昏昏𥨊於長夜困於脩途徑山不忍見向三冬裏轟一聲霹𮦷而使夢者覺行者詣卓一下還覺神清氣爽麼成龍昇天成蛇竄草檀越捨佛五臟請上堂無量法門同歸方寸河沙妙德只在毫端於一毫端上見得便見靈山一會心肝五臟盡在這裏放行把住不由別人若論把住不消一捏若論放行則釋迦老子自還釋迦老子文殊普賢自還文殊普賢阿難迦葉自還阿難迦葉護法諸天自還護法諸天不妨各得其要各住自位各務本事助佛揚化盡未來際無有退轉正恁麼時如何此功德海無邊際流出當人一念中一念真心充法界當知福報亦無窮上堂恍恍惚惚杳杳冥冥非精非物非佛非心缺齒老胡得之而不識颺在乎嵩山之陰諸人還識得麼水上青青綠元來是浮萍浴佛上堂釋迦老漢初生下時一手指天一手指地云天上天下唯吾獨尊後來有孝順兒孫要一棒打殺與狗喫者又有將惡水驀頭澆者點撿將來總出佗圈繢不得徑山則不然當初若見只與佗摩頂云易長易養管取教佗哭也不成笑亦不得上堂召大眾云猫有歃血之功虎有起屍之德所以抦持佛祖正印者殺活卷舒遊刃自在理故當然若據今日盡天下衲僧到徑山這裏總須乞命然雖如是吹毛雖利不斬無罪之人上堂釋迦掩室於摩竭淨名杜口於毗耶須菩提唱無說以顯道釋梵絕聽而雨花後來又道斯皆理為神御故口以之而默豈曰無辯辯所不能言也師云肇法師不謬為座主善說出格道理若是徑山則不然草木天下同破庵和尚忌日拈香太湖濵南湖畔行脚不著便撞著這老漢分明兩箇五百文剛然證道是一貫當時被渠淈𣸩一場究竟成箇不了公案逗到今日如何結斷炷香云神光斷臂豫讓吞炭出山鄉歸上堂召大眾云三家村裏神樹子十字路頭牛屎堆拾得寒山曾破至今拍手笑咍咍你這一隊後生三條椽下閉眉合眼恣意妄想知什麼茄子瓠子重九能仁西堂同定首座至上堂召大眾云三十年前與吾石谿商量一段因緣橫也不奈何豎亦不奈何至於七日竟無折合懡㦬而休誰知三十年後驀然撞在面前不待商量自然默默相契非但石谿至于定公首座亦同此見毫髮無差且道如何是相契底事節屆重陽日短夜長為石谿和尚赴蔣山引座寶公寶山之寶非青黃赤白等色亦非大小方圓等相三賢莫辨十聖那知是故公亦秘惜若非其人未易分付今日石谿不涉安排計較突然在前無心而得既得之已亦不以為奇特眩曜於人是則故是爭奈我此千百衲子虗心久矣皆欲一見是以鳴鼓集眾慇懃虔請願陞此座於香煙起處放此寶光令我一眾因此寶光獲見此寶同得受用盡未來際求無退失然雖恁麼更有一事不得不疑或有箇沒意智漢不識好惡犯眾出來道蔣山蔣山不得將常住物作自己人情吾姪却須自作支遣莫教累及老叔恐人無憑先此奉白上堂參禪衲子擔箇不會到處問人東邊問張老西邊問李老問來問去忽然一旦會得元來便是箇不會底雖然莫將圖上水喚作洞庭波上堂佛祖命脉洞然明白黑漆屏風松蘿亮隔冬至上堂孟冬薄寒仲冬嚴寒寒則普天普地寒結成冰片凍破泥團達磨不會大難大難臘八上堂拈拄杖云雪山六年凍不死一麻一麥餓不死無端更道悟明星躂倒至今扶不起拄杖子試著力看卓一下普賢蹙頞文殊偷喜上堂纔擬恁麼便不恁麼成現生涯陳年滯貨雪峯輥出三箇毬𡎺著嵩山破竈墮師嘉熈三年正月二十五日奉聖旨特賜佛鑑禪師師領眾迎接望闕謝恩畢遂鳴鼓陞座拈香祝聖罷據座問答不錄乃云形名未兆文彩全彰見聞知覺覿體純真坐臥經行全身奉重應萬機而無滯融十虗而不痕左右逢原縱橫得妙然雖如是堯舜之君猶有化在且把定乾坤獨超今古一句作麼生道雲淨日月正風暄草木香臣僧師範凉薄之蹤於道無取茲者恭蒙聖恩特賜禪號寵踰其分媿溢于中是由昔日靈山付囑之重以至今日有茲叨遇上感聖恩上感聖恩但臣下情無任激切屏營之至復說偈云只箇叢林粥飯僧濫膺徽號媿無能臨風將底祝君壽遙指南山千萬層上堂靈山獨付飲光少室單傳可祖黃梅夜半傳衣臨濟臨行囑付徑山這裏無衷私底佛法今日普為諸人保任此事終不虗也只是第一不得生風起草第二不得匿影逃形懸崖鳥道不得寄跡留聲白日青天不得噡言𥧌語老僧恁麼告報莫成𥧌語麼良久云正是𥧌語浴佛上堂僧問未離兜率已降王宮未出母胎度人已畢此意如何師云頭陀石被莓苔褁擲筆峯遭薜茘纏進云世尊初生一手指天一手指地目顧四方周行七步意作麼生師云乞兒伎倆進云只如世尊道天上天下唯吾獨尊又作麼生師云屎窖裏出頭來進云雲門道我當時若見一棒打殺與狗子喫貴圖天下太平未審據何道理師云喪車後掉藥袋進云既是未離兜率因甚已降王宮師云南地有竹進云未出母胎因甚度人已畢師云北地有木進云如何是徑山今日報恩一句師云惡水劈頭澆僧禮拜師乃云土宿頷下長髭鬚淨飯宮中生悉達西天此土絕知音千古萬古阿剌剌上堂山僧近日偶因送客下山途中撞著箇田厙翁佗便近前相接見其頗恭遂問云翁翁高姓渠遂指空中一片雲道長老還見麼山僧對云見佗又道見什麼乃依實對佗道是一片黑雲翁云今夜定有雨山僧見其語頗異又問佗翁翁高居甚處渠便荷鋤而行更不回顧信之淺草有毒蛇平田有猛虎雖然已被徑山勘破了也且道誵訛在什麼處我這裏七八百衲子盡是禪中之精必能緇辨解制上堂孤峯頂上百草頭邊豎去橫來築著磕著汝等諸人提坐具向日本國裏作自恣佛事即不問長連床上喫粥喫飯一句作麼生三年一閏上堂一是一二是二天是天地是地南北東西各依本位只是當時二祖不合禮老胡三拜使我東土人至今無處出氣然雖如是蛇無頭不行上堂昨日九月九過了重陽節今日憶重陽陞堂何可說擬欲問黃花黃花雖有在東籬擬欲問白醪白醪雖有非我知不如一時放下衲被幪頭從教門外風颼颼雨颼颼幽州江口採石渡頭三三兩兩釣漁舟掛御書寶所額五峯插天一塵不到特標寶所雲漢昭回不問南來北來普請一時證入證入則故是其中事作麼生香風吹動春長在瑞氣氳蟠夜不収掛寺額寧宗御書古佛示此額今佛成此額文彩全彰當陽顯赫直得龍翔鳳翥日月騰輝地闢天開山川改觀凡曰見聞駭心動目莫不因此額而得入此門既入此門則見廣大樓閣清淨道場綿亘十方彌綸八極重重華藏處處莊嚴交光相羅如寶絲網不相障礙無壞無離而使人人除一切障滅一切惑及得一切諸總持門於少時間入無量劫不動本處徧遊十方得徧處定殊勝境界隨處現前所見不忘所思不亂原其旨歸皆由古佛今佛廣大願力之所攝持不可思議廣大願力既不可思議則知佛之壽量亦不可思議佛之壽量既不可思議則知所化國土廣愽嚴淨亦不可思議所化國土既不可思議則金枝玉葉曄曄騰芳亦不可思議然此不思議事非口能宣非言所及則故是只如涓此良辰特標此額千祥併集萬善同歸一句作麼生道但願春風齊著力一時吹入我門來出鄉歸上堂法無定相遇緣即宗竿木隨身逢場作戲十字街頭橫拖倒拽三家村裏順俗和光桑樹上中箭柳樹上汁出則且置坐斷千差一句如何話會五峯依舊插天寒復云竿頭絲線放還収時有金鱗上直鈎風月滿船雖不惡爭如峯頂冷湫湫何故富客不如貧主人佛涅槃上堂舉世尊臨涅槃時以手摩𮌎告眾公案師云衲僧家佛之一字尚不喜聞有甚工夫觀他紫磨金身其如滅度不滅度又干我什麼事雖然如是少間大殿內因甚燒香禮拜殷人以栢周人以栗上堂舉昔日障蔽魔王領諸眷屬一千年隨金剛齊菩薩覔其起處不得一日忽見遂問云汝依何而住一千年覓汝起處不得齊云吾不依有住而住不依無住而住如是而住師云不依有住而住不依無住而住誠實難見徑山逐日與諸人同出同入同起同坐同鉢盂喫飯諸人還知徑山起處麼若也知得則諸人十二時中無虗弃底道理若也不知徑山分明為汝說破乃云東廊上西廊下為新廣壽引座雪峯發九重聖箭誰敢當鋒三聖躍透網金鱗應無雜食要明那畔事須是這邊人三家村裏閙市叢中妙應無私臨機有準雖然如是不是冤家不與隣結制上堂徑山結夏不論功過飯來展鉢盂困則伸脚臥縱有千人萬人只消一箇半箇豈不見流支要打胡達磨因事上堂阿剌剌橫該抹渾無柄如何提掇徑山寺裏八百來僧過夏於中多有肉身菩薩畢竟如何摩訶薩上堂召大眾云一夏九十日只餘半月了也是汝諸人每日區區地理會佗家事自家鼻孔還曾著眼覰著麼若也覰得見便知道元來只在面上十二時中許汝有出氣處若覰不見徑山分明為汝說破遂噴嚏一聲下座謝翠巖西堂新舊知事上堂雪峯輥毬睦州擔版楊歧栗棘蓬東山鐵餕餡多處添少處減留得翠巖眉毛蓋眼上堂拈拄杖示眾云人人有箇水牯牛迥迥地常露現前只為耽於睡眠役於塵事失於管帶一向走入深草裏去竟無尋處十二時中未免迷悶然雖如是要且元在如今要見麼擲下拄杖云頭不少尾不欠中秋上堂一年十二月月月有月半何獨喜中秋一時爭賞翫人人盡道十分圓我道依前缺一半如何是那一半待今夜月從西邊出即向汝道上堂徑山無伎倆住院多阻障飯在平江府口在凌霄上河港既不通千里空相望暫假維摩手一鉢共分餉分餉即分餉了也只是其中飯色有異却不干老僧事上堂現成公案何事不辦百發百中無邊無畔捏不聚撥不散萬籟俱沉兮明月半窻一色難分兮蘆花兩岸上元上堂從上有祖已來的的相承綿綿不墜譬如一燈然百千燈至于今日燈燈相傳光光相照無彼無此無前無後無壞無雜平等清淨然於其間多在光影裏獨有五祖老兒就中較些子何故不見道無油不點燈日首座瑞世延慶上堂拈拄杖云釋迦飲氣達磨吞聲德山臨濟曝腮鱗於龍門自餘之輩三千里外斫額放一線道卓一下云隨分身春色一枝三兩花結夏上堂徑山今日傳箭令下是汝諸人自今日去眼不得妄眎耳不得妄聽口不得妄言足不得妄舉一切皆不得妄依吾令者同此安居不依吾令者貶向無生國裏且如何說箇不妄底道理山僧淳熈四年生經今六十五歲本命丁酉酉生人屬鷄何故不聞道養鷄意在五更初破庵和尚忌日拈香這箇老凍儂從來不賭𢁈剛把胡張三喚作黑李四更於眉上安眉不向鼻中出氣我昔沒興遭逢直得無處回避所以一年罵一頓終未快人意而今對眾盡底揭飜非但教佗舌拄上齶也要天下衲僧腦門著地上堂達磨西來添鹽減醬後代兒孫千般萬樣誰信碁盤石元在凌霄上山僧恁麼道已是龜毛長數丈開爐上堂徑山門下無彼無我大家疊足挨肩共向無煙宿火若是香匙火筯不得動著何故不見道丹霞燒木佛院主眉鬚墮結制上堂徑山今夏向瓦礫場中與諸人禁足安居雖凡事不如儀要且人亂法不亂凡出一言布一令各要遵守有四件事告報諸人不得違戾且那箇四件事徤時要坐禪困時要打眠肚飢須喫飯陸地要行船上堂戶牖見通墻壁生礙簸箕有唇洞庭無蓋若說經律論三藏比量法門現量法門分科列段教中自有人在上堂達磨未來時此土還有佛法麼既來後別有佛法麼何不返照自看只管向外馳求東邊參西邊學禪牀上老凍儂口角頭咂噉大䇿小䇿抄寫還當得麼徑山從來無記憶口吻遲鈍無可施設唯是瓦礫場中有一枚鐵釘諸人朝朝暮暮來來往往因甚覰不見若覰得見𣤩瞎你眼若覰不見𣤩瞎你眼上堂今朝九月九事例皆如舊或採菊或登山或賦詩或飲酒此儒者之事諸方長老遇此佳節亦未免擊鼓陞堂談空說有徑山隨例顛倒遂展手云閙中伸出一隻手良久云作什麼茶鹽錢布施上堂秋風清秋月明秋葉片片秋露零零缺齒老胡不道佗全不知有只是不合向少林九年面壁未免坐久成勞食飽傷心孟節使捨財建造上堂萬緣泯息大用現前殺活卷舒縱橫得妙水盈科而流也所涸者濟弦持滿而發也所當者摧不動神情掃清魔壘致乾坤於掌上揭日月於域中顯逸羣過量之機作希有難能之事至於不有其德不居其功安貼家頓轡自樂正與麼時如何通信深沉滄海恩波闊皎潔秋空氣象高謝首座秉拂并諸莊執事上堂夫說法者無說無示其聽法者無聞無得所以南泉不出方丈却在莊上喫油糍既被鬼神覰破未免土地前添一分供養還會麼水高一丈船高一丈端午上堂以拂子作書符勢山僧書一道神符普施大眾使千妖百怪邪魔魍魎之鬼各退百由旬外不敢仰視佩此符者皆獲吉祥忽亘符使者來告云如上神符莫不靈驗外鬼為殃固以走散內鬼作祟最難遣除山僧向佗道誠如所言然別有箇神呪使外鬼內鬼粉為微塵悉皆掃蹤滅迹乃扣齒云內鬼外鬼是何面觜有大神呪消弭消弭良久云太上老君急急如律令以拂子擊禪床下座掛鐘聲此洪鐘一新號令有四願言宜加聳聽扣一下云皇帝萬歲扣一下云重臣千秋扣一下云安鎮家扣一下云興隆佛法願以此願同此洪音殷殷谹谹久而愈鳴連扣三下上堂萬籟沉沉孤月團團葉零零兮山瘦風蕭蕭兮夜寒拍禪牀云不知誰共倚欄干重九上堂去年不在家虗過重陽節今年既在家須要強施設淡水煑冬瓜真箇滋味別不知滋味者却似嚼生鐵何故眾口難調上堂有求皆是苦無求乃真樂山僧前日出鄉四十餘日晝乞村落夜寄僧房脚纔到家又復入城謁見檀越區區如此莫非有求可謂是苦然覓一針鋒許苦相了不可得事畢歸來通身放下晝食三頓夜臥一牀一切無求可謂是樂然覓針鋒許樂相了不可得苦樂雙亡如何通箇消息得與諸人共知去良久云德山托鉢歸方丈麻谷携鋤入菜薗謝都寺首座上堂重巖風露清深院霜天曉一曲少林春幾人彈得妙自古彈者希亦復聽者少以之贈伯牙伯牙不肯要以之獻子期子期拍手笑休休不如留取自彈一曲謝我新舊知事首座也要諸人共聞以拂子擊禪牀云何似大石調上堂徑山不敢相謾開口便見心肝今朝十月十五下元解厄水官或有箇漢出來道長老長老非但飽學亦乃高才只向佗道便是蘇東坡七世為人也未會在出水鄉歸上堂拈拄杖云山僧前日領眾泛一隻無底鐵船徧化南州北縣聚落鄉村無不經過所化既眾所得亦不為不多末後到一乾闥婆城於閙肆中偶見舜若多神與驕梵鉢提二人對坐於閻浮樹下其前置一寶物價直不啻三千大千世界於是二人論義義勝者得此寶驕梵鉢提乃問舜若多神曰汝既無身憑何立義舜若多曰以虗空為義舜若多神却問驕梵鉢提汝既無舌憑何立義驕梵鉢提曰以寂默為義二人辯論經八十返不分勝負山僧聽之既久忍俊不禁於是近前問二賢者可容老僧與此高論否二人曰有何不可吾二人於此論義勝負未分若得吾禪師一決不勝至幸山僧遂云若以虗空為義則問者亦空答者亦空聽者亦空其義亦空若以寂默為義則問者亦寂答者亦寂聽者亦寂其義亦寂有何勝負耶二人不能加答老僧遂向佗道兩人爭不住打歸常住於是得此寶歸脚未跨門庫司知事也要修造諸公也要山僧云二俱不可老僧出去多時我此一眾寂寞既久不若先將此寶散我現前大眾且做箇暖熱擲下拄杖云渾崙休擘破却要眾平分聖節上堂天清地寧慶襲一人九州四海咸被堯仁熈熈然涵泳化育猶千花萬卉之逢春以拂子作舞勢云山僧恁麼且道意作麼生舞蹈揚塵上堂五峯門下百種全無僧牀迫窄堂供蕭疎脚下踏著底破塼頭碎瓦礫面前撞見底王獦獠李麻胡恁麼薄福住山真箇辜負老胡雖然如是更點分明病起上堂山僧病即諸人病諸人病愈即山僧病愈如是則山僧即是諸人諸人即是山僧於其中間覓一絲毫彼我之相了不可得得到這箇田地是謂一味平等無有高下然後山僧自山僧諸人自諸人張上座自張上座李上座自李上座病則各自病愈則各自愈人人不相知彼彼不相涉是謂是法住法位世間相常住與麼說話阿呵呵笑殺杜順和尚開爐上堂禦寒古有家風在三個柴頭品字煨今日無柴又無炭從教各自撥寒灰豈不見道深深撥有些子平生事只如此是汝諸人也且恁麼東撥西撥忽然沒興被你撥著也不定上堂舉拂子示眾云一見便見更不再見張顛草書李廣神箭上堂欲明此事如臨大敵須是號令森嚴軍伍整肅謀臣猛將各得其人然後戰必勝攻必取若不然者眨得眼來一箇箇總是喪身失命底卓拄杖一下云且喜天下太平正旦上堂拈拄杖云舊年佛法說到臘月極盡頭新年佛法又從正月還起頭若論起頭與極頭都盧只在拄杖頭遂喚云拄杖子我且問你今日正月一日也新年佛法從那裏起頭卓一下云元正啟祚萬物咸新伏惟首座大眾各各道體起居萬福東邊立底如龍如鳳西邊立底如鳳如龍人人公辨私辨箇箇宗通說通冤親平等理事圓融又喚云拄杖子我且更問你如何是理事圓融底道理卓一下云一聲遍在諸人耳諸人耳在一聲中謝兩班執事上堂人之形體有耳目有手足可以視聽可以運用一處不仁不名全人若備具者則隨意所適可以成就一切事業叢林体製亦復如是則有知事有頭首以之掌握寺門紀綱清眾一不得人則叢林衰既得其人則叢林振叢林既振且畢竟成得什麼邊事一二三四五各各面相覩甜瓜徹蔕甜苦瓠連根苦朝廷降香祈晴陞座拈香云此一辨香九重城裏頒來五髻峯頭拈出爇向爐中為祥為瑞供養常住三寶三界龍天祈求晴霽願賜感彰仰符聖主之丹心克遂明堂之大禮遂趺座問答不錄乃云大朴未散古佛家風至理既彰通人活計絕緣而照離念而知言發非聲色前不物塵塵爾剎剎爾圓融無際巍巍乎蕩蕩乎綿亘有餘舒卷自由縱橫得妙且坐斷千差一句作麼生道四海浪平龍睡穩九天雲淨鳳來儀復舉僧問太平恩禪師日未出時如何恩云眾人皆仰望又問日出後如何恩云萬里照無私師云太平恁麼答話可謂應時應節徑山今日更資一路或有問日未出時如何只向佗道在日出後如何却向佗道普若更問徑山是臨濟兒孫因甚闡雲門宗旨向道千車自古無歧轍四海如今共一家謝首座維那上堂黃蘗赴堂無端向南泉位中座興化行令從而逐出克賓父不父子不子弟不弟兄不兄千載令人恨不平如今莫有報不平底麼良久云吽吽朝廷撥賜萬年正續院產業上堂田地穩密不妨蕩蕩乾坤寶印發輝又見重重光彩得之諦當用處玲瓏普濟貧乏而有餘饜飽飢虗而無盡而使狂者息昧者明來者安去者適無無不是箇箇歸源法法全彰頭頭有據正恁麼時恩歸何所天高羣象正海闊百川朝復云曉來瑞氣怱怱流出恩波自九重地厚天高何以報飽看南嶽祝融峯孟少保為石田和尚齋僧請上堂靈山密付少室單傳的的相承綿綿不墜不論緇黃青紫大都達者為親是故韓文公肯首於大顛裴相國印心於黃蘗李駙馬參石門著手心頭便判龐居士見馬祖一口吸盡西江此皆從上真宗古今一貫我石田師兄末後句子固不容易今付而無庵居士亦不容易承當膠漆相投繩繩有在然這一片田地四至界畔契券分明幸有當人一時承紹了也惟中間樹子莫怪徑山却有分在何故無蔕花頭須結子不萌枝上要抽條復云前日無庵以石田拳頭塞石田鼻孔後來靈隱癡絕凡以無庵拳頭塞無庵鼻孔逗到徑山這裏無拳頭可用未免却借鼻孔特為出氣去也石田不下尋常種一味深耕種蒺藜沒興有人親踏著痛連心髓血淋漓此恨難雪此悔難追慢罵呪詛活陷泥犁這般冤結何時解直待虗空落地時上堂達磨西來不立文字直指人心見性成佛甞聞大亂之本生乎堯舜之間其末存乎千載之後千載之後其必有人與人相食者也誠哉是言解制上堂舉岳林振禪師示眾云布袋口開還有買賣底麼時有僧云有振云不作貴不作賤作麼生買僧無語振云老僧失利師云岳林設箇問頭也似從容閑暇及乎被這僧道箇有便見荒亂七手八脚一時俱露徑山今日布袋口開莫有買賣底麼良久云異獸藏頭角靈禽惜羽毛謝首座秉拂新舊知事上堂夫說法者無說無示其聽法者無聞無得說聽俱忘語默不二如是則一語一默一動一靜一進一退悉皆不二是謂微妙清淨平等不二法門然雖恁麼不落因果因甚墮野狐不昧因果因甚脫野狐以拂子擊禪牀云參上堂非至巧不能極其妙極其妙處巧亦無所施巧無所施妙亦不存然後可以隨機應變不滯一隅至於垂一機示一境自然去離泥水有活人眼目是故運斤者必須敏手而受斤者亦須有不動之質昔臨濟喫黃蘗六十山藤猶蒿枝拂相似百丈遭馬祖震威一喝直得三日耳聾且道古人還有漏逗處麼爐鞴之所鈍鐵猶多結制上堂龍蛇混雜凡聖交參儱儱侗侗顢顢頇頇雖則顢頇於中却有箇分曉處如何見得前三三後三三破庵和尚忌日拈香燒香草舍蚊煙禮拜小兒匍匐楊歧頂上握拳何似鎮州蘿蔔噫有年無德上堂長河裏有一隻爛官船櫓棹蓬蓆頭尾都無要撑駕又撑駕不得修整又修整不得毀拆又毀拆不得官路上朝朝暮暮來來往往多少人看見多少人覬覦只是不敢動著何故動著即禍生解制上堂一夏已滿無事不辨遂府鉢盂卭州磁碗謝新舊兩班上堂天知地知你知我知阿難合掌迦葉攢眉盡道徑山寺裏兩班職事各得其人如南泉之有黃蘗慈明之有楊歧新之與舊退之與進各得其宜只如藏頭白海頭黑又作麼生禹力不到處河聲流向西中秋上堂指月與話月檐雪共填井翫月與捧月未免弄光影月聻以拂子打圓相云見麼彷彿似鹽官扇子元來恰是雲門胡餅開爐上堂世人住處我不住世人行處我不行天下叢林今日開爐諸方老凍儂聲皷集眾所說法要莫不說火說炭以此二者為佛事或說炭庫藏身或說折合還歸炭裏坐不然說我喚作火你不得喚作火或說死柴頭上火或說無煙火文武火徑山這裏總不得道著若道著炭火二字便是觸諱犯突吉羅罪既不許道著畢竟如何露箇消息應箇時節去徑山有箇道理乃云通身黑𥻘皴人人盡知有開口便道著何曾燒却口雖然如是也是蕭何制律上堂古德道昨夜雨滂澎打倒蒲萄棚知事普請行者奴子拄底拄撑底撑撑撑拄拄到天明依舊可憐生我今保任此事終不虗也是故我不敢輕於汝等緣汝等一箇箇皆是現在諸佛是汝諸人還自信得及麼遂合掌云噁佛佛上堂達磨大師道吾法三千年後不移易一絲髮許大眾舉頭看見鉢盂峯一生參學事畢何故不見道不移易一絲髮許淨慈無極和尚遺書至上堂六十四年作麼生生憎佛祖黃連未是苦一笑飜身什麼處去也虗空獨露元來只在這裏下座炷香瀹茗以醒瞌睡謝兩班上堂山僧今日打箇四門斗底陣以阿閦佛須彌相佛等恒河沙數諸佛把定東門以日月燈佛名聞光佛等恒河沙數諸佛把定南門以無量壽佛無量相佛等恒河沙數諸佛把定西門以焰肩佛最勝因佛等恒河沙數諸佛把定北門以釋迦佛彌勒佛盡此土現在諸佛等以為中軍又以文殊普賢觀音勢至等諸菩薩眾及阿難迦葉賓頭盧頗羅墮等諸二乘僧以為隊伍陣勢既圓却出箇暗號子而使不期而集不約而同不令而行不戰而勝既是勝矣然後與見前大眾同樂無為之化事既捷矣所謂暗號者不妨明說與諸人要知麼良久云東山下左邊底浴佛上堂黃面老子二千年前四月八日纔生下來便乃眩曜螢火之光蚊蚋之見却道天上天下惟我獨尊當時若早遇雲門後代兒孫不至遭佗鈍置雖然如是一喜一悲朝廷降香祈雨滿散水陸陞座祝香罷趺坐僧問震法雷擊法鼓布慈雲兮灑甘露且慈雲從何而起師云彌綸八極進云甘露從何而降師云何處不清凉進云恁麼則法雨均霑大千普潤師云石筍也抽條進云記得溈山一日與僧樓上看雨僧云好雨時如何師云鈎頭有餌進云溈山道好在什麼處僧無語又作麼生師云如天普蓋進云溈山道你問我我為你答僧便問好在什麼處溈山指雨示之又且如何師云切忌隨佗去迢迢與我疎進云可謂只知看雨勢不覺濕伽梨師云禪客亦宜照顧僧禮拜師乃云欲識佛性義當觀時節因緣時節既至其理自彰拈拄杖云看看拄杖子化為龍振鱗𩮻奮爪牙鼓動風雲大霈甘澤直得大根大莖小枝小葉隨其大小稱法界性各得生長而使苗而不秀者秀秀而不實者實慶一人之有道合四海之懽聲正恁麼時如何稱讚太平又見風光好旅不賷粮戶不扄敘謝不錄復卓拄杖一下云喚起凌霄峯頂龍縱橫變化妙難窮一聲霹𮦷擎頭角三日為霖四海通上堂一葉落天下秋趙州八十行脚中途撞著一塊石𡎺著玄沙脚指血濺梵天直得山僧拄杖子至今忍痛因甚如此不見道一以貫之上堂擾擾怱怱晨鷄暮鐘瑞巖不會喚主人翁喜晴上堂雲收霧斂地闢天開處處彌勒門門善財拍膝云安得真男子同上黃金臺上堂入荒田不揀信手拈來一似預辦雪峯輥毬睦州擔版提起破沙盆却是漏燈盞徑山三百六十骨節骨節欲斷是汝諸人還搆得麼若也目顧東西却是老僧相賺病起佛涅槃上堂病多諳藥性經驗始傳人老僧自去年八九月得病恰恰半年是病皆病過病既多隨分也諳些藥性元來黃連便甜甘草便苦附子至冷大黃極熱其餘藥草各各有性既知藥性便可療病而乃見驗所謂經驗始傳人見驗則故是要且却傳與人不得須是自得其妙始得若自得妙處則手頭活落指下疎通不問身病心病肺肝胃腎是冷是熱是深是淺或表或裏或重或輕來到面前一一分曉便能隨病與藥令他一人人脫體而去記得黃面瞿曇臨涅槃時摩胷告眾若謂吾滅度非吾弟子謂吾不滅度亦非吾弟子是則是膏肓之疾當時若有箇作者下得一服藥便見釋迦老子死中得活當時既是放過徑山今日且作死馬醫試下一服看拈拄杖卓一下云是你諸人還會麼若也會得古佛元在其或不然靠拄杖云過去久矣閏月旦上堂二月復二月韶光尚可留雪消深㵎底花發舊枝頭萬木寒威解千峰翠色浮有誰知此意拍膝云相共倚危樓上堂古者道不可以有心求不可以無心得不可以語言造不可以寂默通是汝諸人還會麼方圓一片七畆有寬界至已定不用差官師將順寂上堂山僧既老且病無力得與諸人東語西話從前說不到底今日勉強出來盡情向諸人面前抖擻去也遂起身抖擻云是多少
