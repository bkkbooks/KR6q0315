body:
  text: 普說善哉三下板知識盡來參既善知時節吾今不再三若據恁麼告報已是埋沒諸人了也直饒向未鳴板已前各自知時去亦未救得一半那堪三三兩兩聚頭接耳握節當胷在這裏聽山僧胡言漢語也大屈哉彼彼丈夫彼彼行脚阿誰無分何不奮發拈坐具將山僧劈口便摵拽倒禪床掉臂而去豈不慶快平生雖然也須實到恁麼田地始得所以參須實參悟須實悟須兩脚踏實地始得須得本道公驗入手始得若真箇得入手底自是不干事過關過鋪𮌎次蕩蕩地掉臂便行了無疑忌你若未得入手纔到關津去處心下未免不穩縱然硬不管拍盲打過腦背後忽然有箇人道㘞地一聲時你便面赤被他人捉下一場敗闕不同小小又如你眾中兄弟相似若辨得千百貫錢買得一道真正度牒插在懷裏到處行脚抽單挂搭不妨自由自在你若來處不分明得處不正當便是自求不快活也你纔跨門便被人指點這漢了不得莫教更撞著箇不恰好底將你無巴鼻揑一揑你便手忙脚亂反不如做箇三家村裏漢過世却無如許多事所以適來向你道須是兩脚踏地始得本道公驗入手始得你若到恁麼田地亦未可便休不見古者道參禪須是悟悟了須是遇人若不遇人十箇五雙杜撰灼然如是第一不得檐板自恃須是捨短從長就人決擇我此門中千差萬別隱顯殊途除大智洞明其他莫能知之豈不見木平參洛浦便致一問云一漚未發時如何浦云移舟諳水脉舉棹別波瀾平不契却往問盤龍一漚未發時如何龍云移舟不別水舉棹即迷源木平便悟去後來雲峰悅和尚拈云木平若向洛浦言下悟去猶較些子後來不合向盤龍死水裏浸殺住後有問如何是木平平云不勞斤斧果然只坐在這裏你道他恁麼說話意在於何多見兄弟往往商量道移舟不別水舉棹即迷源便是死水如何是木平不勞斤斧所以只坐在這裏若恁麼會驢年也未夢見在這裏須是覰透他古人一些子得人憎處始得又不見芙蓉寧訓禪師訪實性大師大師上堂以右手拈拄杖安左邊云若不是芙蓉師兄大難委悉便下座後來黃龍拈云實性大師用不得便休却將佛法以當人情至今千古之下作人笑端你且道黃龍恁麼道是肯他不肯他到這裏若只是參得蘿蔔頭禪底敢保他理會不下所以參禪既是得頭又須得尾方是不疑天下老和尚舌頭你若是真箇未有入頭處便須把做至緊至要底一件事理會始得古人大有方便控你入路便須晝三夜三將一則咬不破底話頭冷地裏東咬西咬忽然蹉口咬破自笑一回然後就這裏扶持起來甚生標格更有一事奉告兄弟切不得自作艱難先自退屈纔作恁麼見解便無有得底時節雖然又須是著些眼腦始得若是俊底一覰便透自然不死在句下記得古人道我有一句子待犢牛生兒即向汝道又道我有一句子待洞水逆流即向汝道又道我有一句子待案山子倒卓即向汝道到這裏眼矒瞪底也且莫怪山僧今日老婆更為你通一線路我有一句子未到焦山時已與諸人道了也自是諸人當面諱却雖然如是還諱得麼拍禪床下座今夜普說乃是因大師所請意旨伏為報薦淑妃娘子陳氏欲結般若因緣資薦冥福又為一切人開發道心直是殊勝直是廣大山僧少曾普說以平生口吻遲鈍又無記性夫蓋普說須是法性寬波瀾闊還佗前輩大珠南陽德山臨濟巖頭羅山後來圜悟大慧應庵近來亦少雖然雲月是同谿山各異大底有大底生涯小底有小底活計然又千說萬說究竟只是說底此事又不在說處蓋當人分上各各壁立萬仞直是坐斷誵訛曾無箇非箇是自是道流於中妄生節目妄生紐揑自作障礙以至不得受用灼然這裏著一點外料不得纔涉一絲毫外料便成剩法為鉢盂安柄所以動即影現覺即冰生直饒你不動不覺正坐在必死之地到這裏如何體悉如何湊泊如何得與此事相應去是須得通身汗出自家冷地裏失笑一回始得你若未得恁麼一回任你說得盛水不漏只成外邊打之遶只添得箇一場熱閙要且與此事了沒交涉豈不見白雲祖師道你若得真正一回汗出去一莖草上便現瓊樓玉殿你若未得一回汗出縱有瓊樓玉殿却被一莖草蓋却誠哉是言可謂是棒打石人頭剝剝論實事你若真箇踏著這些子自然無許多勞攘等閑蕩蕩地閑閑地驀被人拶著便乃水底火發拈來便用一一蓋天蓋地其實無佗一切處總是自家底不用安排計較所以不動一塵不撥一境見事便道答話長老插脚不入是皆前輩見得透頂透底無一絲毫滲漏方有這箇說話若是膚淺之流豈可同日而語耶若據乳峯這裏實無禪與人參無道與人學只是箇著衣喫飯屙屎送尿底一箇無意智漢荷湖海衲子諸位大師不鄙來此孤峯絕頂共守枯淡所以尋常亦不敢輕易兄弟凡遇五日須要上堂三八須挂牌勉強以塞方丈之責亦不是矜誇學解眩曜見知及造妖揑怪只據自家所見赤骨律地與兄弟相見然兄弟來室中吐露箇消息底不道全無亦多有在正路上行底纔見兄弟在正路上行亦不敢輕放過便乃下堦引行一兩步纔到放手處又却多去不得其實無佗蓋未曾真正一回汗出故也然這一解安排不得計較不得若是俊底一咬便斷一覰便透却無許多顧忌若是機思遲鈍底却不可等閑放却直須志願堅確勇銳直前一切境界搖撼不動一切語言移換不得如經蠱毒之鄉水也莫霑佗一滴壁立千仞豎將去始終不變驀地手蹉脚跌便見倒撲始得不受人瞞方可不辜負行脚初志臘月三十日亦不怕閻家箇漢且如因大師佗雖是箇尼僧宛有丈夫之作原其所以佗從富貴中來正因出家正因行脚正因見善知識正因學道蓋佗因地既正始終不妄所以亦不辜佗前日十月二十八日夜忽然引手摸著鼻孔便知道元來大頭向下便來方丈通其所以當時悔不痛與一頓想他如今却思得一頓喫惜山僧拄杖又却不在且待別日分付然得箇柄入手正好放下雲頭就人淘汰佛殿裏黃面老漢正參禪在所謂麤餐易飽細嚼難飢今時麤餐者多細嚼者少山僧今日打開更說與你如今正好近前理會也得退後理會也得乳峯長老也是好笑又教人近前理會又教人退後理會是什麼語話若是得底人必然暗地點頭佗前日初得箇消息懽喜無限便自主張諱人道箇不是近來却一向放下聽人說話然參禪第一不得擔板若不擔板自冬至夜數到太年朝前頭大有雪在你纔擔板便賺了天下蓋無第一手山僧往年入眾參禪自知只得箇不擔板氣力如今雖不望佗古人然却也略知羞耻昔日老東山參得禪了那時也有人不肯佗便有人去與佗說佗便對得別却是諸公盡得老師說話我見老師但識羞耳這識羞兩字子直是軟頑古今知識天下衲僧是到不到總出佗底不得灼然此事須是識羞始得若不識羞直饒你參得徹悟得到只是箇會禪漢纔被明眼人覰見只成好笑且道乳峯與麼道還識羞麼也要諸人撿責更有一頌舉似大眾開化因大師正因來行脚跨門一句子等閑親踏著開却無鬚鎻解却無繩縛末山頂上放癡憨牛頭向北馬頭南拈古世尊陞座眾纔集迦葉白槌云世尊說法竟世尊便下座師云世尊所說底只是序分迦葉所說底只是流通分若是正宗分未曾動著徑山今夜不惜眉毛敷演去也拈拄杖卓一下云會麼三段不同収歸上科又卓一下世尊般涅槃已迦葉後至槨示雙趺師召大眾云靈山百萬勝集唯迦葉獨紹祖位誠不忝矣何故為佗親見黃面老子脚跟來世尊見文殊在門外立世尊云文殊何不入門來文殊云我不見有一法在門外師云解說出格道理還佗七佛之師檢點將來不可放過當時待佗與麼祗對從而向佗道且居門外若向這裏透得許佗出得女子定傅大士道冠衲衣儒履朝梁武帝師云傅大士如善玩珠固無觸手墮地之失雖然未免傍觀者哂育王當時若作傅大士待佗問莫是僧耶便以手指衲衣對之免見重重敗闕古人則且置遂以拳安頂上云諸人只今喚作什麼梁武帝請傅大士講經傅大士分科列段已是周遮老誌公曲順人情重增話然雖如是要且未曾動著正經在且正經畢竟作麼生講顧示大眾云洎合落在葛藤窠裏六祖風旛話師云祖師與二僧恁麼說話總是盲人摸象清凉不然不是風動不是旛動不是心動擲下拄杖云是什麼布袋和尚以破布褁一塊乾屎逢人拈起云兜率陀天底兜率陀天底瑯琊云慈氏菩薩圜悟云熟處難忘大慧云不才淨漢師云若是育王則不然待佗拈起恁麼道只向佗道牢收取僧問馬祖離四句絕百非師云馬師父子傳盃滿泛意在延接高賓惜乎這僧不善開懷到底却成虗設只如道藏頭白海頭黑又作麼生不覺日又夜爭教人少年馬祖同百丈智藏南泉翫月師云三箇老凍儂一人曲彎彎地一人圓陀陀地一人黑漆漆地馬大師養子之緣末後念一道真言一時與佗蓋覆著可惜放過當時一等與佗本分草料後代兒孫不致扶籬摸壁有僧參馬祖祖𦘕一圓相云入也打不入也打僧便入祖便打僧云和尚打某不得祖靠拄杖便休師云這僧敢將赤體挨佗白刃要且入得出不得諸人還知麼馬師一條拄杖至今猶靠壁在馬祖𦘕圓相雪竇云二俱不了靠却拄杖劈脊便打師云雪竇也只見一邊殊不知馬師當時靠却拄杖這僧至今無奈何處是汝諸人還奈何得麼若奈何不得到雪竇面前總是喫棒底漢荷澤見思和尚思問甚處來澤云曹溪思云曹溪意旨如何澤振身而立思云猶帶瓦礫在澤云此間莫有真金麼思云縱有向什麼處著師云可惜二俱放過當時見佗道猶帶瓦礫在便與掀倒禪牀不然待佗更覓真金便好和聲痛打豈不勦絕古人且置遂拈拄杖云且道這箇是真金瓦礫擲下云龍蛇易辨衲子難瞞西天大耳三藏至得佗心通唐肅宗召忠國師驗之師云前兩度互相熱瞞第三度親見國師只是通吐不得諸人只今還見國師麼良久云不是不是丹霞訪忠國師國師躭源總被丹霞一狀領過然雖如是不會做客勞煩主人南泉住庵時有一僧到泉云某山上作務汝齋時做飯喫了送一分來其僧齋時喫了却將家事一時打破乃就牀臥泉久伺不來遂歸見僧臥泉亦去一邊臥僧便起去泉住後云我往前住庵時有箇靈利道者直至如今不見師云這僧雖然靈利翻成懵董當時賴是王老師若是別人咬定牙關渾不采著管教佗一生起不得然雖如是却須救取南泉龐居士問七峯此去峯頂有幾里峯云甚麼處去來士云可謂峻硬不得問著峯云是多少士云一二三峯云四五六士云何不道七峯云纔道七便成八士云得也得也峯云一任添取師云一二三四五六得者自得添者自添終竟不知峯頂有幾里歸宗與南泉同行一日告別煎茶師云南泉慣將冷口喫人熱物若不是歸宗洎遭惑亂然雖如是可惜一銚茶歸宗斬蛇本覺云二俱不了待歸宗道你甚處見我斬蛇奪鋤頭便與一钁然雖與麼死蛇斬得也無用處師云本覺道二俱不了徒有此話既知是箇死蛇又却不能活得如今要見活底麼擲下拄杖云看脚下歸宗有僧辭去諸方學五味禪師云古今咸謂這僧等閑將箇五味換得一味殊不知帶累歸宗為佗一人費了多少鹽醬鄮峯這裏也有一味今日不惜普為破慳良久云若到諸方不得錯舉這僧將五味換得一味是則是大似惹禍臨身歸宗一味不同五味好則好爭奈分付不著人清凉這裏五味也無一味也無或有人來辭往諸方學五味禪只向佗道善為道路且道還有誵訛處麼也要諸方撿責泐潭常禪師一日面壁而坐南泉來見遂撫師背一下常云誰泉云某甲常云如何泉云也尋常常云汝何多事師云古人道箇尋常早成多事汝輩後生晚進朝暮聚頭忉忉怛怛地驢年夢見睦州問一座主講什麼經主云涅槃經州云問一段義得麼主云問什麼義州遂踢一踢吹一吹云此是什麼義主云經中無此義州云脫空謾語漢此是五百力士揭石義主無語師云嗄青天白日有恁麼事當時若見佗道此是五百力士揭石義只小小地向佗道不說那知當時若進得此語縱使睦州老漢鐵作面皮也教兩眼覰地趙州勘婆師云一人閙市裏颺碌塼傷中者方知疼痛一人慣施無病藥解服者始覺輕安注也注了解也解了諸人還知勘婆處麼洎合停囚長智僧問趙州萬法歸一師云這箇老漢有年無德被人逼著直得踰墻透壁若是徑山則不然或有問萬法歸一一歸何處只向佗道有馬騎馬無馬步行趙州訪道吾吾著豹皮裩三門外立師云諸人還會麼奴見婢慇懃趙州到一鄉院經旬辭院主遊五臺山主有頌送之師云可惜院主開口了合不得若是徑山待佗問如何是正眼攔腮便摑教這老漢知道草窠裏也有大虫趙州一日向雪中臥乃呌云相救相救時有僧便來趙州身邊臥州便起去師云這僧好心不得好報當時一期雖救得趙州爭奈自己一箇渾身至今臥在雪堆裏眾中莫有救得這僧底麼出來救看若救不得三冬嚴寒總是凍殺底數婆子偷趙州笋師召大眾云婆子下掌快便難逢趙州休去莫道無事好溈山問仰山香嚴仲冬嚴寒年年事師云溈山暗拋香餌誰知牽動清波二子擺尾搖頭未免上佗鈎線是則是只如道賴遇寂子不會又作麼生商量時人只看絲綸上不見漁翁把釣竿告往知來道頭會尾還佗難弟難兄若據子細檢點將來非唯寂子不會只這香嚴猶較三步在具眼者辨畬田種粟晝食夜眠師云溈仰父子故是無一點佛法身心勘證將來漿水錢則且置草鞵錢教誰還二老漢如奏蕢桴土鼓雖無音韻六律全彰育王即不然或有問和尚一夏作得箇什麼只向佗道待有所作即向汝道且山僧恁麼是空過耶不空過耶良久云我與溈山父子不同溈山問仰山即今事即不問自古事作麼生師云仰山進前退後自是今古歷然為什麼溈山却道汝屈我我屈汝會麼良久云鸕語鶴僧問溈山如何是道溈山云無心是道僧云某甲不會山云會取不會底好僧云如何是不會底山云只是你不是別人師云溈山如箭射地雖然不巧箭箭射著育王今夜擬發一箭諸人急須著眼良久云時暑不宜久立香嚴問僧甚處來云溈山嚴云近日有何言句云有問如何是祖師西來意溈豎起拂子嚴云彼中兄弟如何商量云盡道即色明心附物顯理嚴云著甚死急云師意如何嚴亦豎起拂子師云奇哉香嚴老子果然有長處若人辨得許你於佛法中有箇入處僧問香嚴端和尚如何是直截根源嚴擲下拄杖歸方丈師云噁早帶枝葉了也山僧恁麼告報諸人還猛省麼良久云三生六十劫和安通禪師令仰山與我過床子來仰將床子至通云却安舊處著仰如教又問床子那邊是什麼仰云無物又問這邊是什麼仰云無物通云惠寂仰應諾通云去師云本色住山人且無刀斧痕點檢將來也是無風起浪德山托鉢師云嘗聞沛公豁達大度從諫如轉丸誠不妄矣何故不見道躡足封侯巖頭問德山是凡是聖師云巖頭前頭疑殺李將軍後頭笑倒王大伯雖然如是且道那裏是佗一手擡一手搦處哦成月下風前句便有人傳作鬼詩德山示眾云問即有過不問尤乖師云德山老漢一條白棒胡打亂打及乎被這僧拶著折作兩橛黃蘗示眾云汝等諸人盡是噇酒糟漢師云黃蘗潼關巨闢貴圖直取長安這僧既往西秦老漢却之東魯去也臨濟侍德山次山云老僧今日困濟云𥧌語作麼山擬拈棒濟便掀倒禪床師云二大老奮於百世之上固無以加然被甲嬰冑望堯之治遠矣麻谷問臨濟大悲千手眼那箇是正眼師云以的破的以機奪機即不無二大老撿點將來未免一得一失具眼者辨取麻谷問僧甚處來僧云不審谷再問僧云珍重谷下禪床擒住云這箇師僧問著便作佛法祗對僧云和尚大似無眼谷托開云放汝命通汝氣僧禮拜谷又擒住這僧掣肘便行谷云休將三歲竹擬比萬年松師云麻谷用盡神通要且勘這僧不了末後未免麻纏帋褁當時若是徑山問甚處來待佗道不審便與熱棒打出三門外教佗冷地裏呌屈龍牙問翠微如何是祖師西來意微云與我過禪版來牙過禪版微接得便打牙云打即任打要且無祖師意又問臨濟濟云與我過蒲團來牙過蒲團濟接得便打牙云打即任打要且無祖師意住後有問二尊宿祖師西來意還肯佗也無牙云肯即肯要且無祖師意石門聰拈云龍牙不被人挨著則可被這僧一問失却一隻眼師云石門恁麼道只見一邊殊不知龍牙夢中呌屈後來不得這僧問著幾無雪處龍牙問翠微云自到法席已經月餘每遇上堂不蒙一法示誨意在於何微云嫌什麼又問洞山山爭怪得老僧又問法眼眼云祖師來也師云三大老頭腦各別鼻孔一般然總被龍牙將箇斷貫索一時穿却了也惜乎龍牙到了自無出氣處眾中莫有為龍牙出氣底麼良久云如無老僧拾得性命雪峰寄木虵與懶安上書云本自天然不假雕琢安接得云本色住山人且無刀斧痕師云雪峰好條木蛇無端與佗安足返不得為蛇安云且無刀斧痕要且瞞人眼不得提起拄杖召大眾云且道徑山底何似雪峰底還辨得麼擲下拄杖云攛入草蓬裏去也孚上座參雪峰纔上法堂顧眎雪峰便下看知事次日再上方丈見雪峰云昨日不合觸杵和尚峰云知是般事便休師云大小孚上座向雪峰面前重重納敗若非一千五百人善知識度量深明當時直須棒折始得孚上座逞俊太過飜成落節老雪峰不施寸刃坐致太平是則是可惜放過當時一等與佗本分草料兒孫未致斷絕孚上座參雪峰後來雪竇拈云千五百人善知識被孚上座一覰便乃高豎降旗師云大小雪竇隨邪逐惡殊不知孚上座當時只陞得雪峰堂未入得雪峰室三聖問雪峰透網金鱗以何為食師云三聖如蒼檜聳千尋之幹霜而不萎雪峰猶大海容萬頃之波攪而不濁雖然如是總欠一著在玄沙白帋雪峰一千五百人善知識輕輕被人抓著便乃全身放倒後來玄沙雖盡父子之情要且扶不起玄沙坐次見面前一點白指問侍者云見麼者云見如是三問如是三對沙云你也見我也見因什麼不會師云玄沙老漢可謂無事生事瞞人自瞞你也見我也見用會作什麼聲明三藏善別音聲劉大王請玄沙驗之沙以銅筯敲鐵火爐問云是什麼聲藏云銅鐵聲沙云大王莫受外國人瞞後來法燈代云却是和尚瞞大王本覺云三藏瞞大王何似玄沙瞞大王師云噫佛法淡薄那時早恁麼互相瞞若論今日徑山也瞞諸人不得諸人也瞞徑山不得遂以拂子擊禪床云且道是什麼聲長慶道總似今日老胡有望保福道總似今日老胡絕望師云老胡有望不須問著老胡絕望也且罷休畢竟今日事作麼生來日向你道僧問雲巖欽和尚如何是真言答云南無佛陀耶師云古人恁麼可謂明投暗合更不用翻譯然雖如是莫將梵語悞作唐言僧問幽谿大用現前不存軌則時如何師云這老漢平生伎倆向這僧面前呈盡徑山即不然待佗道大用現前不存軌則時如何便與和聲一踏待佗眼孔定動老僧已入大石國裏去也白頭因見韶山山云莫是多口白頭因麼師云白頭因口雖多爭奈開了合不得合了開不得返不奈箇無口底何徑山當時若見佗問莫是多口白頭因麼只向他道這老賊前後觸忤多少賢良以坐具便摵直饒韶山手中有棒亦無施展處僧問曹山抱璞投師請師雕琢師云曹山雖不損花而得蜜亦未免費口分疎山僧即不然或有人問抱璞投師請師雕琢只向佗道明朝更獻楚王看稅闍梨問曹山清稅孤貧乞師賑濟師云老曹山雖則眼目睛明爭奈放過稅闍梨若是育王則不然當時待佗恁麼問拈起拄杖劈脊便打何故禮防君子曹山辭洞山洞山云子向什麼處去曹山云不變異處去洞山云不變異處豈有去耶曹山云去亦不變異師云好大眾田地穩密血脉貫通即不無曹洞父子檢點將來俗氣猶在洞山萬里無寸草處去師云二大老一人下脚不得一人擡脚不起有人辨得許你東去西去洞山一盲引眾盲相牽入火坑石霜雖盡力𨁝跳要且跳不出鄮峰則不然秋初夏末兄弟東去西去第一不得向萬里無寸草處去何故長安雖樂不是久居洞山雖則布漫天網撈蝦蜆摝即得若要羅龍打鳳則不可後來石霜道出門便是草果然臘月二十五師云這公案往往多作奇特話會便道雲門一曲韻出五音殊不知這老漢等閑放屁合著大石調僧問雲門秋初夏末東去西去忽有人問著作麼生祗對雲門云退後退後僧云某甲有什麼過門云還我九十日飯錢來師云雲門先鋒有作殿後併吞是則是要且無大人相徑山則不然待佗道某甲有什麼過只向佗道此去逢人但恁麼舉雲門問僧甚處來僧云嶽山來門云我尋常不曾與人葛藤來僧近前門云去師云葛藤不少僧問雲門如何是直截一路門云主山後僧云謝師指示門云合取皮袋師云雲門大師是則是直截未免飜成紆曲徑山不然或問如何是直截一路案山前若言謝師指示只向道一任東行西行雲門問僧什麼處來僧云江西門云江西一隊老漢𥧌語住也未僧無對師乃云噫可惜許好與劈口摑當時既已放過至今𥧌語未已喝一喝雲門放洞山三頓棒師云雲門前頭疑殺人後頭笑殺人洞山於言下悟去更是好笑如今莫有解笑底麼設有也好與三十棒乾峰示眾云三種病二種光師云乾峰白日青天剛道有鬼不是雲門眼目精明洎遭恐嚇古人則且置只如三種病二種光諸人作麼生透良久云罕逢穿耳客多見泣岐人金峰示眾云只欲舉來恐遭人唇吻只欲不舉又恐遭人怪笑於其中間如何即是時有僧出金峯便歸方丈後有僧問和尚適來為什麼不答金峯云大似失錢遭罪師云金峯大開東閣不遇高賓末後未免自斟自酌金峯拈枕子云一切人喚作枕子金峰道不是師云喚作枕子不喚作枕子總在金峯窠裏且作麼生出得良久云無人過價卓拄杖一下打與三百長慶暹禪師長期以鐵彈子為驗師云若人會得蠟人即是鐵彈子若也不會鐵彈子即是蠟人只如末後道大底大小底小又作麼生落葉飄空或西或東南源示眾云快人一言快馬一鞭時有僧出云如何是一言源吐舌示之云待我有廣長舌即向汝道師云這僧可惜放過南源當時待佗與麼道只向佗道即今亦不短若進得這語管取南源舌頭吐了決定縮不得僧問烏石靈觀師如何是佛觀吐舌示之其僧禮拜觀云見箇什麼便禮拜僧云謝和尚出舌相示觀云近日老僧舌上生瘡師云大眾還會麼醫不得也梁山頌云我有一柄拂真㯶鐵作骨顯道赫蚊䗈指南不相屈掃除佛祖病擊碎衲僧窟若是上上人終不喚作物德山聞得云梁山好頌話作兩橛梁山聞云也是當時少子細師云吽吽克由叵耐青天白日有恁麼事何故賊無種相鼓籠大慈掃地次趙州問般若以何為體後來黃龍新云趙州金鍮不辨玉石不分直饒分去也未夢見大慈在師云這孟八郎漢既少子細未免偏枯殊不知趙州金鍮不辨大慈玉石不分兩箇無孔鐵鎚打就一合乾坤種田愽飯喫師云地藏老兒盡力𨁝跳也只跳不出徑山莫有通方處麼待計較得成即向汝道僧問佛日弼禪師如何是毗盧印弼云草鞵踏雪僧云學人不會弼云步步成蹤師云古人信脚行信口道不妨明投暗合若是育王又且不然如何是毗盧印七凹八凸學人不會古篆分明雖然恁麼道猶較古人半月程這裏風頭稍硬師云明招祇知賣峭不覺重重敗缺復云這裏風頭稍硬鄮峰無可商量你這一隊漢來這裏討什麼碗擲拄杖下座這老漢將明珠作豌豆糶可惜無人醻價當時待佗道這裏風頭稍硬且歸暖處商量一時散去非特表顯叢林參學眼目亦且救得明招一半僧問嚴陽尊者如何是僧陽云喫粥喫飯師召大眾云若也會得喫粥喫飯若也不會直待飽方休浮石開卜鋪斷人貧富生死師云浮石恁麼答這僧話是離五行不離五行若道離五行又道金木水火土若道不離五行且道那裏是佗直指處會麼金木水火土大虫元是虎堪笑李將軍藍田空沒羽汾陽云夜來夢見亡父母覓酒肉紙錢師云汾陽用處故是鬼神莫知撿點將來不無漏逗乳峯這裏素無枝葉亦無閑神野鬼可遣且道還有真實底麼喝一喝五祖舉僧問趙州狗子還有佛性也無自云無也勝猫兒十萬倍師云鄧師伯他是蒲許村裏人愛說蒲許村裏話外人聞得直是莫辨語音隣舍看來也是尋常談吐然雖如是可惜放過當時若見佗與麼道只以手近前擘開眼向佗道猫教這老漢嗔也不得笑也不得運推移布裩赫赤師云玉泉箇漢賣弄一腰布裩渾無縫罅可謂古今難並其風流然撿點將來猶帶些子屎臭氣在有鼻孔者驗取老宿一夏不為兄弟說話師云這老宿幸是一箇好人無端被這僧連累便見失錢遭罪清凉門下不說佛法不論正因且道還免得人點撿也無吽吽淨因揩禪師接韓相公公云禁足不出因什麼却出因云官不容針私通車馬師云淨因長老祗對俗官即得若是禪更參三十年也未會僧問保寧如何是佛寧云鐵鎚無孔師召大眾云不得動著動著打折你驢腰黃龍璣和尚問學者云禪以何為義眾下語皆不契有僧請益璣云禪以謗為義師云禪以謗為義誠哉是言雖然如是須是會謗始得若也會得釋迦老子是乾屎橛達磨大師是破草鞵一大藏教是糞埽堆頭拭不淨故帋其或未然十二時中切不得胡謗亂謗天平見西院商量兩錯師云天平當時便去不受商量不妨令人疑著及乎住後吐露箇消息子細看來却欠商量在唯如西院兩錯畢竟如何商量良久云天堂未就地獄先成長生問靈雲混沌未分時如何芭蕉云相見便休又打破作什麼白兆云若不打破又爭得相見師云若論打破也未得相見若不打破也未得相見正恁麼時如何相見良久云隔本生問僧近離甚處僧云太原生云彼間風景如何僧云與此間不別師云不同處不別不別處不同諸人不言自知只如踏破施主草鞵畢竟當為何事這裏出得那邊風景在若出不得且向此間求僧問高安澄禪師舊歲已去新歲到來還有不受歲者麼澄云作麼生僧云恁麼則不受歲也澄云城上已吹新歲角窻前猶點舊年燈僧云如何是舊年燈澄云臘月三十日師云一句合頭語萬仞繫驢橛然雖如是錯會者多
