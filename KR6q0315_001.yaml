州米賤上堂萬木驚霜風千林著秋色堪笑寒山子到處覓不得拈拄杖云元來在這裏看看卓一下云又入露柱裏去也上堂秋風離離秋色依依嶺上白雲一片兩片籬邊黃菊三枝五枝世間多少登高者只管步步登高腳跟下蹉過往往不知乳峯恁麼道𦘕虎成狸上堂乳峯今日開爐不會挑灰撥火大家衲被幪頭只麼團圞打座不求諸聖不重己靈從他門外區區世路擾擾紅塵夏了秋秋了冬冬了春良久云思量也是慕西秦上堂舉白雲端和尚謂五祖曰有一事老兄還知麼祖曰不知有什麼事端云近有數禪客自廬山來問他也有箇悟處教他說也說得頌也頌得批判也批判得只是未在五祖聞得七日七夜不成腸肚師云白雲和尚用盡自己心笑破他人口乳峯這裏亦有一件事不得不說與諸人近日亦有數禪客自諸方來問他也無悟處教他說也說不得頌也頌不得批判也批判不得雖然如是乳峯却許他是箇千了百當底人諸人聞得亦不用疑著何故南天台北五臺上堂聲前一句不封不樹坐斷舌頭如何通吐昨日有人從天台來却往徑山去上堂臨濟為睦州所誤雪峯遭巖頭毒手沒齒銜冤萬世不朽所以學者當深思彼伐木丁丁之聲照古照今兮宜善求友上堂召大衆云禪禪妙高峯頂千丈巖前作麼生有箇古松樹奇奇怪怪屈屈曲曲弮弮攣攣諸人若恁麼會驢年謝首座藏主秉拂都寺齊上堂古人道法輪未轉食輪先轉乳峯這裏二輪俱轉二輪既轉使我現前一衆聞所未聞之法得未曾有之食此食勢力至於七日然後乃消此食既消其法亦忘不妨三三兩兩水邊林下相呼相喚同徜徉上堂舉丹霞訪古寺經宿至早煮粥熟行者盛一鉢與古寺又盛一鉢自喫殊不顧丹霞霞自盛一鉢喫者云五更侵早起更有夜行人霞遂問古寺何不教訓這行者得恁麼無禮寺云淨潔地上不可點污人家男女霞云忌不問過這老漢師云行者雖好接高賓爭奈手頭短促丹霞不解作客未免勞煩主人當時若自盛粥喫了拽拄杖便行免纍他古寺無點污中却成點污且如何免得良久下座巡堂喫茶上堂前面是懸崖萬仞後面是荊棘叢林兩邊烈焰火聚於中如何轉身趙州老漢在青州作一領布衫重七斤正旦因雪上堂今朝正月一只是尋常日就中殊異處遍界鋪銀色銀色世界已現普賢在什麼處豎起拄杖云看看諸人既不相顧不免却乘六牙香象入五臺山與文殊師兄賀歲去也卓一下滿散天基節上堂王道平平其壽綿綿漁歌樵唱共樂堯年無為焉無私焉乾坤一統舊山川上堂拈拄杖召大衆云未得底人見拄杖便喚作拄杖既得底人喚作什麼若也道得卓一下云即今入地若道不得靠拄杖云直待根生謝天童垠首座上堂萬別千差處事同一家事同一家時萬別千差太白山前水磨日夜輪轉不歇乳峯寺裏參退喫茶謝頭首秉拂都寺齊上堂縱無所畏說大脫空離有希求辨最上供雖然又須是大無慚愧之人方能饜飽法味自餘下劣種草未免遇而不遇不遇底且置而勿論只如饜飽者還有報德處也無乃噫氣兩聲下座壽慶節上堂智度菩薩母容受一切法然於一切法而離分別相分別既離諸法如如蜀江萬派朝滄海閩嶺千尋插太虗上堂擊鼓升堂大衆雲集佛法有底商量今日熱如昨日解制上堂克期取證繫縛盲驢休夏自陳且莫鬼語饒你一坐坐斷別有生涯若到諸方不得道從這裏過夏來何故雪竇親栖寶蓋東謝後堂首座上堂舉趙州會中有二僧相推不肯作第一座主事白趙州州云總教伊作第二座主事云教誰作第一座州云裝香著主云裝香了也州云戒香定香師云趙州老漢是則是觸著便動揑著便轉爭奈七手八腳一時露乳峯這裏不用相推要識第一座便是第二座要識第二座便是第一座良久云少室峯前迷逢達磨上堂秋高增爽氣夜寒添夾被草蟲吟壁根黃葉飄庭際直得山僧展轉返側喜而不𥧌阿呵呵伸腳元在縮腳裏石巖和尚至上堂拈拄杖云久默斯要不務速說既逢識者玉石難藏既是難藏提拄杖云且喚這箇作什麼為復是玉耶是石耶卓拄杖云分敘謝不録復舉阿難問迦葉云世尊傳金襴外別傳何物師云面面相看眼眼𤺊覷衣外別傳有甚憑據倒却門前剎竿著鳳棲不在梧桐樹中秋謝焙經兄弟上堂火焰為三世諸佛說法三世諸佛立地聽聽在說處說在聽處聽說兩忘如何剖露經入藏禪歸海唯是馬簸箕拈弄有餘態每遇中秋玩月時尋思直是令人愛何故不見道簸箕有唇米跳不出上堂舉僧問長沙如何轉得山河大地歸自己去沙云如何轉得自己歸山河大地去後來大慧道轉山河大地歸自己則易轉自己歸山河大地則難有人道得不難不易句來徑山手裏請棒喫師召大衆云衲僧家自己尚不見有山河大地甚處得來又轉箇什麼大惠老漢無端隨後說難說易拍禪床云拈得口兮失却鼻上堂坦坦平如鏡彎彎曲似鈎無人收拾得揚在糞堆頭諸人還收拾得麼良久云芽生也上堂去去實不去途中好善為來來實不來路上勿傾危古人恁麼道也是踏地怕痛乳峯即不然要去便去要來便來善為箇什麼又有甚傾危處只是昨日經過新嶺洪水泛漲吹斷三處石橋却被山僧一時等間過了今朝打鼓升堂你這一隊漢擬來這裏覓佛法良久云且緩緩上堂拈拄杖示衆云彌勒真彌勒分身千百億時時示時人憑拄杖湧身云諸人還識麼往往作須菩提尊者傳將去也便下座冬至上堂節屆書雲一陽生於此日一陽既生萬彚發生萬彚既生無不生者豎起拄杖云且道拄杖子生多少良久云何啻七尺長卓一下謝首座秉拂都寺冬齊上堂無味乃真味真味真無味若知真味者更不說真味曾聞一飽忘百飢今日山僧身便走上堂一年三百六十日看看盡也所謂一年將盡夜四海未歸人然未歸之人直須歸去既歸之者不得守住家鄉何故座久成勞上堂舉僧問雲門如何是雲門一曲門云臘月二十五師云雲門一曲從來無譜韻出五音調高千古就中妙旨許誰知幾擬黃金鑄子期天基節上堂君臣道合正是法身邊事且作麼生是法身向上事祝融峯頂萬年松盤根聳幹凌蒼穹故舊至上堂善演胎禽拈拄杖示衆云我有一語非甜非苦既遇知音如何通吐夜來點得柳土獐如今變成尾火虎卓一下佛涅槃上堂靈山山上葛藤樹引蔓牽枝遍界生慚愧波旬推倒後東西有路與人行雖然也須照顧腳下住慶元府阿育王山廣利禪寺語録侍者惟一了禪了心等編指三門此箇大解脫門每日與諸人同出同入遊戲於其間諸人行一步山僧也行一步諸人行兩步山僧也行兩步然一步兩步較易三步五步較難腳頭腳底當自看指法座大衆須彌燈王無時不為諸人說大般若諸人還聞麼其或未然鄮峯又從序品去也升座祝聖罷問答不録乃云形名未兆玉本無瑕文彩既彰物歸有主添些子張三發惡減些子李四生嗔不添不減雲門扇子𨁝跳上天𡎺著帝釋鼻孔東海鯉魚打一棒雨似盆傾正恁麼時如何話會良久云南山依舊與雲齊復舉阿育王問賓頭盧尊者親見佛來公案拈云阿育王等間借問翻成節外生枝賓頭盧覿面提持不覺眉毛拖地育王當時若見他與麼祗對便與近前以手加額叩齒三下使老尊者縱有神通亦無展處當時既已放過只如末後道阿耨達池龍王請佛齊貧道是時亦與其數意作麼生風來雲意騰騰湧雨霽雷聲殷殷收當晚小參三日前五日後佛法委在新鄮峯手裏放行也得把住也得卷舒在我縱奪臨時倒拽橫拖七穿八穴與麼與麼狸奴白牯相共證明大難大難碧眼黃頭亦須莽鹵黃連甜甘草苦發機須是千鈞弩卓拄杖一下復舉僧問鏡清如何是大道之源清云從這裏流出頌云從這裏流出滔滔無盡日巨浪湧千尋誰知無一滴上堂韶光爛熳時百卉皆妍秀處處有春風村村自花柳靈雲眼裏添釘玄沙袖中出手除非自解倒騎驢一生不著隨人後前仗錫率庵和尚至上堂舉趙州訪茱萸公案師云是則是殺人可恕無禮難容子細看來也是茱萸招得當時若解咬定牙關使趙州縱不斬頭截臂亦須自領出去古人且止只如今日率庵訪來雖則不言探水然而未跨門時屋裏三長兩短已被他一時見了也何故明眼人難瞞上堂舉古德道說得一丈不如行取一尺說得一尺不如行取一寸鄮峯說也說不得行亦行不得只是當時不著便誤從南方來中途𡎺破腳母指至今疼痛猶未已上堂今朝解制佛在世日謂之自恣之辰諸修學人各呈所得我此五百大衆一夏百二十日豈無長處有則出來吐露看諸人既是祕而不言待問拄杖子看遂拈拄杖云拄杖子我此一衆你道還有長處也無自云無衆人既無長處長老莫有長處也無自云無長老既無長處莫有短處也無乃云有試道看粗羮淡飯家常事傷醋傷鹽笑殺人前住天童淨和尚遺書至上堂太白峯前收陳腳鑑湖歸唱村田樂無端調轉入新豐誰知錯處非常錯直得洞水逆流乳峯倒卓石女攢眉木人淚落此曲如今誰共聞越山無際天無垠上堂拈拄杖云三日前五日後藥若不瞑眩厥疾弗瘳卓一下云折腳雲門見睦州重陽上堂今朝九月九談禪不開口若是陶淵明攢眉便回首籬邊黃菊正芬披一枝兩枝三枝四五六七枝上堂一句子墨漆黑無柄有準則良久云會麼碓搗東南磨推西北開爐上堂清寥寥白滴滴匙挑不上針劄不入是則是須知花發不干春切忌寒灰煨殺人上堂千討萬討討不見都不要討却成現十字街頭逢阿爺眉毛蓋眼胡鬚面咦佛成道上堂拈拄杖云天上星地下木見便見休𧬊速老瞿曇空揑目三七日心返復從此拏空便脫空天上人間遍流毒帶纍兒孫直至今醫得耳聾成瞎禿鄮峯雖與同路行却不與他同處宿畢竟如何乃撗擔拄杖唱云月子彎彎照幾州卓一下云欵乃一聲山水緑正旦上堂拈拄杖云老僧舊歲一年專與兄弟說虗頭話逗到臘月三十日也無一句靈驗從今日新年去不免改聲換調專與諸人說實頭話去也卓一下云牛角長三尺兔角長七寸元宵上堂樓臺上下火照火車馬往來人看人火照火則且止所謂往來人但能看人十箇五雙不能自看諸人若解自看直是教你無著面皮處何故投子道底上堂擬即差動即隔忘伎倆絶聲色兩手揶揄懡㦬休東村有箇王大伯喝一喝請淵首座立僧上堂召大衆云山僧數年來泛一隻無底鐵船運載南北東西無家之子游泳於大寂滅海有時順水張帆有時逆風把拖要且不著此岸不著彼岸不住中流然撥轉船頭處須是大家著力前堂首座慣諳水脉善別風雲今日正當千波萬浪之間豈容坐視敢望慈悲出一隻手共相斡運何故不見道船上無散工謝保寧即庵和尚至上堂鳳凰臺畔玉几峯前築著磕著夙世生冤且道還解免得麼以手指空云天天結制上堂拈拄杖云育王傳箭令下應是此土他方人間天上若凡若聖若佛若魔皆集吾拄杖頭上安居禁足共結長期有不順吾令者四門天王飛熱鐵輪追之令至至則至矣合發明箇什麼事卓一下云南斗七北斗八上堂舉趙州道老僧除二時粥飯是雜用心且道趙州二時粥飯外在什麼處著倒雖然如是鄮峯即不然遇粥喫粥遇飯喫飯喚什麼作雜用心還會麼若也會得二時上堂許你隨隊喫粥喫飯若也不會閻羅王在你鉢盂匙筯上請保寧西堂掛牌上堂善知識者如大醫王善療衆病應是佛病祖病心病禪病一切毛病不待一見便知深淺既知深淺不妨應病與藥所謂羸者益之盛者損之表者汗之裏者導之至於用藥之際不問牛溲馬勃巴豆黃連皆為妙藥亦能殺人亦能活人灼然能殺而不能活一切死人活不得能活而不能殺一切活人死不得善此二者便能起膏肓救必死致一切人於大休大歇大安樂之場至無疑之地然雖如是遂豎拂子云且道這一揑子畢竟是殺耶活耶是黃連耶巴豆耶保寧西堂智眼洞明善能區別下座與大衆同伸拜請敢望慈悲為衆點出上堂分曲直定錙銖還他作者觀風雲別氣候須是其人我此一衆盡是其人以拂子指云試著眼看還辨別得麼良久云朝霞不出門暮霞行千里謝監收上堂舉趙州和尚道夫為善知識者須以本分事接人鄮峯這裏但願諸莊豐熟粥足飯足供養我禪和子令教箇箇飽齁齁地若是本分事斷然不敢舉著何故老不以筋力為能上堂混沌未分已前幸然好一局棊無端佛祖競出頭來一時著壞了也鄮峯素非國手今日試與諸人活一著看拈拄杖卓一下云錯上堂拈拄杖召大衆云飢則傷暑飽則傷風不飢不飽正是膏肓之疾我此一衆固不在此數雖然作者好求無病藥卓一下解夏上堂鄮峯一夏與諸人說無義語却被閻家老子不肯放過別置地獄相延所謂鑊湯爐炭刀山劒樹碓搗磑磨犁耕拔舌等事倍於無間山僧末上檐頭便入如是衆苦甘受不辭不辭則故是諸人還甘麼三生六十劫上堂有一物黑似漆亘古今無人識却被秋蟲知唧唧空嘆息而今拈出普請看遂拈拄杖云見麼見麼擲下云分文不直上堂人皆競賞中秋惟有山僧不管大都天上月圓只是尋常月半更有不識好惡底無端指月話月玩月又道正好供養正好修行拍禪牀噁長夜漫漫何時旦上堂行不動塵語不動唇現成行貨黃金白銀君不見洞山老問佛直答麻三斤上堂輕如鴻毛輕重若丘山重安排不得處信手拈來用拈拄杖云雖是死蛇却要活弄擲下云爺爺開爐上堂衲僧門下無可不可熱則到處乘凉寒則圍爐向火飢則餐困則臥執法修行如牛拽磨上堂拈拄杖召大衆云這箇拄杖子在諸人分上過山過水東拄西拄不妨全得他氣力若到山僧手中直是要豎不得豎要橫不得橫何故卓一下云大都緇素要分明上堂二月春光明媚是處花酣柳醉五湖四海禪流切忌開眼瞌睡我此一衆盡是惺惺底驀拈拄杖豎起云且道這箇是什麼良久云我喚作拄杖子卓一下云你不得喚作拄杖子靠拄杖下座靈隱高原和尚訃音至上堂來無所從南高峯北高峯去無所至東㵎水西㵎水幻泡忽滅證得烏龜成白鱉清風未已須信高原元不死既不死且道在什麼處拈起拄杖云見麼見麼卓一下云認著依前不相似上堂名不得狀不得復是何物見得到用得親不由別人有時恁麼有時不恁麼無毛子貼天飛帶角大蟲當路臥上堂當明有暗當暗有明口說如啞眼見如盲畢竟作麼生門外一條通驛路朝朝暮暮有人行上堂玄沙不出嶺保壽不渡河高亭見招手乃撗趨資福望剎竿便回去這四箇漢總缺一錐何故人無遠慮必有近憂破庵和尚忌辰拈香炎炎六月飄風灑雪百丈耳聾黃蘗吐舌海濶山高誰與論一回飲水一回噎上堂九日今朝是那知是不是若道不是淵明把酒登東皋若道是窮子赤身眠露地到這裏往往十箇五雙有理無雪處且聽拄杖子為諸人出氣卓拄杖一下開爐上堂瞿曇你自瞿曇達磨從他達磨佛法有底商量各自歸堂向火雖然如是也須照顧眉毛入城出隊上堂召大衆云現前坐立儼然面面相看眼眼𤺊覷諸人也瞞山僧一點不得山僧也瞞諸人一點不得雖然須知有互相熱瞞底句若有試出來露一班看如無山僧不免效七佛威儀倒騎佛殿穿汝諸人鼻孔去也出隊歸上堂拈拄杖召大衆云半真半假千家貨非實非虗百寶囊卓一下云盡底打開都見了有誰合火共分贓靠拄杖云一分奉釋迦牟尼佛一分奉多寶佛塔上堂拈拄杖召大衆云有般漢見拄杖喚作拄杖有般漢見拄杖不喚作拄杖要且總沒交涉還會麼二由一有一亦莫守一心不生萬法無咎擲下拄杖云三祖大師來也上堂現前三昧了無向背雪壓樓臺風號松檜憶昔水潦被馬師一踏踏倒起來不覺失聲道只向一毫頭上識得根源阿呵呵笑倒明州憨布袋臘八值雪上堂召大衆云黃面瞿曇昔往雪山六年苦行夜覩明星忽然悟道於是三七日中思惟如是事直得無啓口處非特瞿曇鄮峯展轉思惟亦無啓口處雖然事無一向也要露箇消息良久云會麼今朝臘月八回觀雪山雪密灑鄮峯前曾無兩般色上堂一年三百六十日看看盡也所以道是日已過命亦隨減如少水魚斯有何樂又道當勤精進如救頭然諸人試各自猛省看是樂是不樂若未得其樂直須如救頭然縱饒樂去亦須如救頭然何故田厙奴不見道學則不固謝首座上堂叢林綱紀之設貴在得人有如國家拜將相似須是文武兼備韜略雙全有濟險扶危之手然後可以克服天下莫不從風而靡而吾教亦類於是者所謂肘臂欲其重爪牙欲其利非利不能開鑿人天非重不能權衡佛祖具此二者叢林乃振叢林既振且合發明箇什麼事良久魯祖面壁雪峯輥毬上元請首座立僧上堂突兀聲前句宏量外機未明三八九難辨力圍希諸人若辨明得去便見從上來的的相承燈燈相續直至如今真風不墜儻或未然堂中首座深諳此旨各宜師而親之扣而問之莫待老來空手歸上堂卓拄杖云內空外空內外空四大五蘊不可得山河大地不可得不可得亦不可得復卓一下云舜若多神面皮黑上堂拈拄杖云拄杖子難摸索有時喜有時惡攪動滄溟衝開碧落卓一下云何如普化搖鈴鐸上堂形名未兆文彩全彰短者自短長者自長黃面瞿曇徒自說黃道黑胡鬚達磨何須歷魏遊梁拍禪牀云長憶江南二三月鷓鴣啼處百花香上堂三月春將老萬木獻青杪微雨濕殘紅泉聲雜幽鳥堪悲堪笑寒山子歸不得忘却來時道上堂拈拄杖卓一下云德山不會喝一喝云臨濟不知諸人向什麼處與育王相見復卓一下連喝兩喝上堂拈拄杖召大衆卓一下云恆沙世界諸佛國土索然粉碎釋迦彌勒飲氣吞聲自餘間佛間祖又向甚處出氣然雖如是不當宗乘端午上堂盡大地是藥無不是藥者信手拈來用頭頭非取捨拈拄杖云這箇是什麼藥卓一下云萬病丸新智門誼和尚至上堂舉僧問智門蓮花未出水時如何門云蓮花僧云出水後如何門云荷葉師云一徑直二周遮衲僧會得眼裏添沙若是育王又且不然有問蓮花未出水時如何荷葉出水後如何蓮花且道與智門還有優劣也無川僧藞苴浙僧瀟灑上堂召大衆云古人九十日夏克期取證而今眨眼已過半夏了也諸人分上事作麼生是有所證是無所證若有所證則且置而今止餘半夏也未有所證底快須證取且證取箇什麼荷葉團團團似鏡菱角尖尖尖似錐風吹柳絮毛毬走雨打梨花蛺蝶飛上堂三分光陰二已過作麼生靈臺一點不揩磨灼然屙屎放尿亦無餘地貪生逐日區區去樊噲踏鴻門喚不回顧爭奈何不是河南便是河北育王今日鼻孔在諸人手裏一任橫拖倒拽中秋上堂萬籟聲沉沉虗堂夜寂寂不見寒山子未免空相憶休相憶遂舉拂子云元來在這裏與諸人共賞中秋從而惡口小家道吾心似秋月碧潭清皎潔無物堪比倫教我如何說說則說了諸人因甚見似不見聞似不聞拍禪牀云可煞惺惺上堂古者道從文殊門入者墻壁瓦礫為汝發機從觀音門入者蝦蟆蚯蚓為汝發機從普賢門入者不動步而到雖然新月有圓夜人心無滿時上堂今朝八月二十五記得洞山離查渡韶石山頭打不回直至如今無本據問佛便答麻三斤何似庭前柏樹子會麼蒼鷹搦臥兔猫兒捉老鼠上堂萬籟風悽悽千林露滴滴塞鴈起平沙夜蟲吟破壁舉一不得舉二放過一著驀拈拄杖云更聽拄杖子露箇消息卓一下上堂召大衆云無道可學無禪可參黃頭碧眼徒話指南霧斂雲收天宇寬門前幸有千朵青山萬朵青山徘徊羸得倚欄干上堂此箇事諸人除是不知不理會則已若知了要理會直是殃害殺人無理會處何故諸人擬向東邊尋要且不在東邊擬向西畔討要且不在西畔諸人只欲硬放下都不管著又却一似宿世冤家相似不能得脫離去正恁麼時畢竟如何即是豎拂子云冤家冤家謝首座秉拂上堂橫說豎說何曾動著舌頭逆行順行總是家常茶飯有準繩無畔岸以拂子劃一劃云會麼吾道一以貫冬至上堂拈拄杖召大衆云一陽生萬彚生正當生作麼生卓一下云羣陰消殄吾道大亨上堂舉僧問普濟如何是祖師西來意濟云庭前一叢竹經霜不自寒畢竟如何只聞風擊響知是幾千竿師云諸人還會麼諸人若會便見有宗門直指底道理若也不會育王更為頌出仍舉前頌下座上堂一年十二月此月乃當盡一月三十日此日方起頭此日即是尋常日那裏是起頭處此月即是尋常月那裏是盡頭處若向這裏著得隻眼許諸人會不遷義其或未然起滅不停念念遷謝逗到三十日閻羅老子徵你飯錢莫言不道臘八上堂黃面老漢二千年前於正覺山前夜覩明星忽然悟道於三七日中思惟是事直是無啓口處灼然此事呈似人不得說與人不得其惟證者乃可知焉且知底事作麼生豈不見真淨和尚道頭陀石被莓苔褁擲筆峯遭薜荔纏羅漢院裏一年度三箇行者歸宗寺裏參退喫茶育王今日無暇與諸人喫茶下座同詣妙勝殿炷香作禮然於作禮處各宜照顧且照顧箇什麼莫教磕破腦門上堂聲前句量外機明歷歷峭巍巍舉者既少見者亦稀拈袈裟角云見麼見麼抖擻多年穿破衲襤毿一半逐雲飛散天基節上堂虗空廣大聖心廣大虗空無邊聖德無邊以無邊之德被於華夷以廣大之心包乎天地包乎天地其心愈明被於華夷其德日新綿綿而長存蕩蕩而難名正恁麼時如何野老不知堯舜力鼕鼕打鼓祭江神上元上堂今日是元宵令節不問紅塵閙市酒樓花洞處處放燈王孫公子車馬駢闐往來觀看乃至騷人墨客長篇短句更相酬酢莫不以燈為佛事所謂一燈然百千燈燈燈相續一句演萬億句句句朝宗雖然如是且道一燈未發一句未形已前如何體悉良久云寧可截舌不犯國諱佛涅槃上堂黃面老凍儂賤賣間骨董為世大醫王誰知多病痛到頭力盡計窮猶自摩胸告衆謂吾滅度非吾弟子謂吾不滅度亦非吾弟子遂顧示大衆云會麼楚雞不是丹山鳳上堂春風浩浩春雨綿綿花凝曉露柳帶寒煙造化無作而作萬法不然而然達磨九年空面壁善財走得腳皮穿上堂人人腳跟下有一坐具地諸佛出世祖師西來不敢動著一絲毫山僧今日亦不敢動著一絲毫亦要諸人不動一絲毫直下搆取願視大衆云還搆得麼良久苔生也上堂淺聞深悟深聞不悟迷逢達磨趙娑呷醋上堂木中有火鑽之始明礦中有金煉之始精諸人分上各各有無價之寶如何甘自溺於陰入之坑陰入之坑卓拄杖一下云打破了也且寶在什麼處擲拄杖云各宜辨取上堂過去諸如來斯門已成就好與三十棒現在諸菩薩今各入圓明好與三十棒未來修學人當依如是法好與三十棒何故不見道齊之以禮上堂一夏逡巡已過半往往精勤成懶慢幸然底事十分現成因甚到夜打疊不辦君不見趙州末上見南泉何似雪峯參老觀破庵和尚忌日拈香我昔未行腳時便知道鼻孔在面上及乎遊歷諸方後依前不移易一絲毫許幸自可憐生無端失腳到這老凍儂面前被他橫兩橫一時打失了也直至如今無言可說無理可伸雖然舉香云喚這箇不是本色道地得麼上堂阿剌剌橫該抹天何高地何闊碧眼與黃頭徒自閙聒聒育王恁麼道也是將鹽止渴謝監收上堂一處通處處通手頭活落腳下玲瓏常記南泉提起處刈禾鎌子快如風上堂仰面看天低頭地明眼衲僧討甚巴鼻豈不見山前明覺寺裏有箇陳闍黎解道蘇嚕蘇嚕悉唎悉唎上堂古者道譬如鴈過長空影沉寒水鴈無遺蹤之意水無沉影之心正恁麼時取不得捨不得不可得中只麼得且道得箇什麼展兩手云會麼有錢布施無錢慙愧中秋上堂前月只此月後月亦此月何得塵世人競賞中秋節競賞即不無且作麼生是廣寒宮裏事良久云南泉拂袖之何處藥嶠披雲笑不休上堂臨濟問佛法大意於黃蘗三度喫六十拄杖後來却於大愚處肋下𡎺三拳所謂爐鞴之所鈍鐵尤多德山出峽來氣吞宇宙逗到龍潭吹滅紙燭失却鼻孔遂將疏鈔一時焚却云窮諸玄辨若一毫置於太虗竭世樞機似一滴投於巨壑猶涉廉纖在臨濟德山且置且道育王為人在什麼處良久云晝見日夜見星重陽上堂拈拄杖云九日當佳節黃花處處新相逢多醉客少見獨醒人卓一下云打草只要蛇驚上堂拈拄杖示衆云見見之時見非是見見猶離見見不能及且見不及處如何體悉卓一下云僧堂覷破香積厨鴟吻咬殺佛殿脊上堂舉拂子召大衆云只這是莫過於此隨我者隨之南北不隨我者死住東西諸人若抵死不信後五日十字街頭撞見阿爺莫道育王今日不說上堂七佛已前無消息處有消息那箇不知七佛已後有消息處無消息是人不會知不知會不會璞玉渾金泥團土塊大慈笑翁和尚至上堂若欲發明箇事須遇其人既遇其人自然眼眼相照彼彼相諳似金博金如水與水豈不見大慈一日掃地次趙州問云般若以何為體慈云般若以何為體州呵呵大笑次日趙州掃地次大慈却問云般若以何為體州放下苕仍復呵呵大笑大慈便去方丈師舉了乃呵呵大笑云這二老漢冷眼看來也是好笑笑須三十年始得何故將謂胡鬚天下赤誰知更有赤鬚胡冬至上堂六陰剝盡不可停留一陽復生難為遮掩難遮掩處物物現成不停留時塵塵解脫舉拄杖云只這箇豈不現成卓一下云豈不解脫恁麼會得許諸人證不退轉地其或不然一九二九三九四九從頭數去前頭大有寒凍在上堂一年十二月只餘此一月此月極盡處又見明年月循環既無端何勞強分別分別不生則前後際斷前後際斷則真智現前真智現前則不見有現前之量亦不作不現前之解正恁麼時如何豈不見琅琊讚菩提達磨云師心兮戴上堂錦包特石鐵褁泥團現成活計格外鄉談明眼衲僧會不得月移梅影上欄干歲旦上堂今朝正月一日且要捉景第一不得說雜話說佛說法是雜話說禪說道是雜話說玄說妙是雜話作麼生得不成雜話去良久云果然散天基節上堂言而足終日言而盡道言而不足終日言而盡物言而不足則且置作麼生是足底道理良久云蟠桃結實三千歲睿算延鴻億萬春因事上堂有一人聞此事歡喜讚嘆我說是人永劫沉淪有一人聞此事闡提毀謗我說是人活陷地獄且道二人中那箇可救會麼前三後三十雙五單江南地暖塞北大寒佛涅槃上堂二月十五瞿曇滅度諸天悲泣羣魔鼓舞且道鼓舞底是悲泣底是育王敢道總不是何故清平世界無間地上堂春色依依花木芳菲滿眼滿耳絶毫絶釐惟有子規知此意一聲聲道不如歸上堂黃蘗樹頭蜜果破席袋裏珠珍愈藏愈顯日久日新爭似揚從間壁角聽教人道不逢春謝都寺結夏齊首座秉拂上堂召大衆云山僧昨夜偶因無事起來東行西行至佛殿前約三更時忽見張上座李上座二人在中庭互相徵問張云今年都寺好結夏齊李云好在什麼處張云施主沓至連供者三使我一衆皆獲饜飽一飽之餘更無餘念所謂一飽忘百飢是也李云飽則飽矣更須除却箇飽始得此飽不除為飽所礙則為虗飽非真飽也張云某甲只恁麼老兄作麼生李云恰是首座好秉拂張云好在什麼處李云凡出一言道一句莫不驚羣動衆去離泥水活人眼目使我一衆見所未見聞所未聞皆得法喜禪悅之樂張云樂則樂矣也須忘却箇樂始得此樂不忘為樂所困不為樂也二人互相問難經八十反山僧在暗地裏聽得忍俊不禁咳嗽一聲二人驚愕云噁元來和尚在這裏二人於是近前問訊復舉前話殷勤致問願求一決山僧見他語聲高低遂於手上揑一揑二人懡㦬散去莫知所之已而樓頭鐘動東方既白矣即今擊鼓升堂重舉一遍以謝都寺首座也要大家共知舉亦舉了謝亦謝了知亦知了且道山僧當時於手上揑一揑二人懡㦬散去意作麼生諸人還會麼良久云斷鐫白字當道種青松徑山少林和尚遺書至上堂召大衆云少林消息絶大地一團鐵愁殺寒山子無言倚寥沉悲風流水聲嗚咽端午上堂入荒田不揀信手拈來無不是藥隨手用去無不應效而能起膏肓活必死假使盡大地人一一抱各各不同到育王這裏不消一服總教伊脫體安樂而去遂拈拄杖卓一下云諸人還覺神清氣爽麼又卓一下云更饒一服上堂五五二十五六六三十六縱以大衍數終是數不足數得足無不足碧眼黃頭口啞舌禿破庵和尚忌日拈香我與這老漢本自無交涉狹路偶相逢歡喜成冤結此結不可解此冤不可雪唵噴噴㗶㗶勑攝上堂朝碌碌暮悠悠非懈怠非精修畢竟如何華亭船子北地趙州解制上堂九旬今已滿那事竟如何無為無事人往往成蹉跎育王敢道不蹉跎何故少年曾決龍蛇陳老倒還同稚子歌
