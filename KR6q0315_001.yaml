body:
  text: 佛鑑禪師初住慶元府清凉禪寺語録侍者宗會智折編師於嘉定十三年三月二十八日入院指三門云平直道路敲磕門庭豎四橫三是人知有新清凉到這裏又作麼生入寺看額佛殿你坐我立尺短寸長口耳不及正好商量商量箇什麼三門頭合掌佛殿裏燒香踞方丈前三後三今日明日達磨不會九年面壁拈府帖祖師巴鼻衲僧巴鼻有些巴鼻全沒巴鼻因甚如此公驗分明拈法衣著清淨衣說法身佛著無差別衣說報身佛著無分別衣說化身佛遂提起衣云這箇是什麼衣衆眼難瞞指法座須彌寶座高八萬四千由旬佛身長八萬四千由旬當自立身如彼座像乃可得坐且道新清凉身長多少乃云俱遂升座拈香云此一瓣香恭為今上皇帝祝延聖壽萬歲萬歲萬萬歲恭願金輪統御玉葉騰芳四海歸仁萬入貢次拈香云此一瓣香奉為判府節制尚書洎闔府尊官判縣郎中伏願永佐明君長居祿位次拈香云此一瓣香奉為楊岐第八世前住安吉州鳳山資福禪寺破庵禪師大和尚爇向爐中用酬法乳遂趺座問答不録乃云靈山話月曹溪指月遞代相傳證龜成鱉範上座尋常有一張口挂在壁上未曾動著今日無端入這行戶事到如此也只得東簸西簸未免拈起多年曆日於中點出些子誤賺處說似諸人且要郭大李二鄧四張三知道江南兩浙春寒秋熱然雖如是黃河三千年一度清復舉永明潛禪師僧問達磨西來傳箇什麼潛云傳箇䇿子僧云恁麼則心外有法潛云心內無法後來佛鑑拈云心內心外有法無法稍稍參問底便知只如道傳箇䇿子且道䇿子中說箇什麼孔門弟子無人識碧眼胡僧笑點頭師拈云大凡明辨古今決斷是非也須是斬釘截鐵始得佛鑒恁麼提掇前頭莾鹵末後顢頇所以蹉過䇿子裏頭事且道䇿子裏頭畢竟說箇什麼上大人丘乙己當晚小參問答不録乃云法無定相遇緣即宗用不停機隨宜應變有時好未必好有時惡未必惡栴檀林裏噴伊蘭鐵牛擎出黃金角這箇則且置只如據令一句作麼生道吹毛曾不動遍界髑髏寒復舉德山示衆云今夜小參不答話問話者三十棒時有僧出山便打僧云某甲話也未問因甚打某甲山云你是甚處人僧云新羅人山云未跨船舷好與三十棒師拈云德山老兒一條脊梁硬似鐵拗不折無端被這僧將一片麻皮等間纏倒了也且道誵訛在什麼處具眼者辨取謝兩班上堂一箇是一箇兩個是兩箇東土小釋迦西天胡達磨拍膝一下云卞璧驪珠成滯貨浴佛上堂今朝又值四月八天下叢林皆浴佛清涼有令不能行隨例大家𤺊淈𣸩雖然淈𣸩於中却有箇分曉處且道有甚分曉西天胡子沒髭鬚黃面瞿曇無頂骨諸人若不信少間佛殿裏驗取上堂十四十五賤如泥土十六十七貴如金璧此意分明說向誰天上人間惟我知上堂來住清涼寺匆匆一箇月間時間有餘忙時忙不徹誰知忙與間稱鎚渾是鐵舜若多神笑點頭驕梵鉢提長吐舌上堂舉一不得舉二放過一著改旦令辰恭惟知事頭首耆舊大衆各各道體起居萬福左顧如冰如霜右盻如金如玉鵠白烏玄松直棘曲山僧返復更思量六六元來三十六上堂瞿曇瞬目迦葉破顏山僧聞得咬定牙關上堂一葉落天下秋一塵起大地收新羅打鐵火星飛燒著廬山羅漢院裏王和尚腳指頭磧境廟大王忍痛不禁直得通身汗流起來道恩大難酬笑倒溈山水牯牛解制上堂一毛頭獅子百億毛頭現百億毛頭獅子一毛頭現拈起拄杖云看看十方諸佛諸大菩薩有學無學盡在清凉拄杖頭上作自恣佛事浩浩地辨論不已被維摩老子喝一喝直得懡㦬散去在東還東在南還南在西還西在北還北還本土已依位而住各務本事諸人還見麼若不見且聽拄杖子重說偈言卓一下中秋上堂尋常月是中秋月中秋月是尋常月看來真箇只尋常道是尋常又還別別別無物堪比倫教我如何說瑞慶節上堂雲從龍風從虎聖人作而萬物覩雪峰輥三箇木毬禾山老一味打鼓海水揚波須彌作舞因甚如此皇天無親惟德是輔老範首座至上堂陽春曲無弦琴聲偃六律韻排五音月冷兮風清山高兮水深舉世有誰知此心良久顧示云聻上堂索寞清凉寺家風實可憐白雲迷谷口黃葉聚階前衲破通身冷柴生滿室烟誰知今日事不異普通年謝新舊知事上堂鶴唳于天魚躍于淵涵波泳月兮悠悠乘雲馭風兮翩翩時哉時哉不可得而明焉令人長憶老南泉上堂客從遠方來遺我徑寸璧中有四箇字箇字無人識雪竇只知開口不覺舌長清凉則不然客從遠方來遺我徑寸璧中有四箇字不必重拈出何故古篆分明上堂一不得收二不得放是則迦葉擎拳非則阿難合掌志公不是間和尚上堂諸佛知處諸人不知不知最親諸人會處諸佛不會不會尤切且道因甚如此雞寒上樹鴨寒下水佛成道上堂老胡半夜見明星瞎却平生兩眼睛直至如今無摸索一回舉著一傷情雖然不經一事不長一智王知縣到上堂舉王常侍訪臨濟遊僧堂公案師云臨濟老絲綸在手不妨卷舒自如王常侍明鏡當臺一點瞞他不得只如末後道將謂是箇俗漢諸人作麼生商量須知傅說非傳說莫把曾參作魯參上堂春日遲遲春風浩浩靈利衲僧點即不到唯有東村王大翁作麼生良久放牛喫我溪邊草結制上堂舉古者道十方同聚會箇箇學無為此是選佛場心空及第歸若道有無為可學有佛可選無有及第之時若道無可選無可學亦無有及第之時畢竟如何花須連夜發莫待曉風吹上堂玄沙𡎺著腳指頭至今忍痛水潦喫馬師一踏大笑不休清凉山裏萬菩薩到處覓不得拈拄杖云元來在這裏卓一下云賺殺人借庵至上堂和麩糶夾糠炊米半夜三更瞞神呼鬼冷地有人見直得左手掩鼻山僧燒沉香供養他何故不是冤家不聚頭謝監收上堂穀熟豆熟粥足飯足仰面看天兩手捫腹這箇說話分付他了事衲僧若是口赫赤地說禪說道說玄說妙說有說無說長說短山僧不敢與他較量何故家住東州謝職事上堂衲僧用處了無定度握土成金握金成土所以有時進一步百事頭邊沒回互有時退一步衲被幪頭渾不顧只如不進不退又作麼生行者打鼓山僧上堂大衆問訊侍者燒香戒香定香慧香願此香雲遍法界供養過去諸佛現在諸佛未來諸佛且望大慈大悲乃舉手云莫怪空踈伏惟珍重上堂舉僧問雲門樹雕葉落時如何問云體露金風這跛腳阿師與麼答話誤了多少人不作佛法會便作世諦會了不作世諦會便作佛法會了若是清凉則不然有問樹雕葉落時如何只向他道體露金風須是恁麼始得中秋上堂八月十五月圓當戶夜半正明天曉不露取箇眼兮耳必聾捨箇耳兮目必瞽君不見老長沙弄爪牙一踏踏倒小釋迦將謂是箇老大蟲元來却是一隻虎上堂乾坤之內宇宙之間中有一寶拈拄杖示衆云見麼若真箇見得去隨時受用亦只可可地終不大驚小怪若不見且安舊處不得動著遂靠拄杖上堂南泉和尚道山僧十八上解作活計趙州道山僧十八上解破家散宅清凉不然山僧十八上做僧十八上行腳出一叢林入一寶社到處橫草不拈豎草不把於一切時只領現成受用如今四十五也依然只是舊時人懵懵懂懂百無一能阿呵呵堪對暮雲歸未合遠山無限碧層層上堂一冬二冬你儂我儂暗中偷笑當面脫空雖是尋常茶飯誰知米裏有蟲豈不見南泉道夜來好風吹折門前一枝松上堂開口即錯閉口即喪不開不合十萬八千到這裏如何通信監院昨日設齊若僧若行俱飽燈籠露柱亦飽一飽忘百飢人人盡展眉太平無事日唱箇囉囉哩好大哥上堂一年三百六十日臘月盡是歲除夜夜來臘月已盡舊歲當去今日新歲到來及至天曉大開門戶祇候新歲竟不見來躊躇良久正沒理會處忽然撞著箇聰明大王出來道長老長老好把曆日子細看更有一箇閏月在山僧被他點破不覺呵呵大笑過去已過去未來亦未來即今名現在現在安在哉三段不同收歸上科卓拄杖一下上堂若論箇事直是省要易會多是諸人自作艱難自作障礙所以有時東廊西廊見諸人和南問訊山僧便乃低頭相接其實無他只要諸人識得長老是西川隆慶府人事若識得去便與諸人打些鄉談說些鄉話如今且未說你識得長老且各自知得自家鄉井也得還知麼明州六縣奉化八鄉上堂年年是好年日日是好日好事大家知今朝正月一元宵上堂人看人火照火無雜壞忘彼我與麼會得許你親見然燈如來得受記別如今十箇五雙多是坐在光影裏動輒隨人腳跟後轉乃高聲云大衆衆舉首復云不信道普請上堂一拽石二搬土三分甜七分苦糞箕拈起兩肩擔揚下钁頭無覓處唵墳噴㗶㗶悉哩蘇嚕佛涅槃上堂黃面老漢二千年前有五件沒量罪過直至今日未有一人舉著清凉小比丘不惜口業從頭點過也要衆人共知始從兜率宮中不依本分示生閻浮是第一沒量罪過又不合半夜逾城直往雪山六年苦行做盡萬千模樣向明星現時打失鼻孔便大驚小怪道奇哉一切衆生具有如來智慧德相但以妄想執著不能證得似與麼欺胡瞞漢誑呼閭閻是第二沒量罪過又不合起道樹詣鹿苑列三乘分五教說有說無說頓說漸說偏說圓說出許多間言長語污人耳目纍及後代是第三沒量罪過至於末後打箇沒合殺却向雙林樹下示般涅槃以手摩𮌎告衆猶自口吧吧地道汝觀吾紫磨金軀瞻仰取足無令後悔若謂吾滅度非吾弟子若謂吾不滅度亦非吾弟子所謂到老不知羞耻是第四沒量罪過更有第五沒量罪過良久休休數人不要數盡罵人不要罵著少間下座與大衆同到大佛殿燒一炷香點一甌茶普禮三拜且與他一時蓋覆著若蓋覆得去則天魔拱手外道歸心迦葉擎拳阿難合掌若蓋覆不得來年更有新條在惱亂春風卒未休結制上堂安居結制現前三昧普化搖鈴老盧踏碓上堂古聖道是法不可示言詞相寂滅是何言歟清凉今日出廣長舌去也遂指云這邊是香爐這邊是花瓶會麼三錢買兩錢賣中秋上堂舉玄沙示衆云吾有正法眼藏涅槃妙心分付摩訶迦葉猶如話月曹溪豎拂猶如指月鼓山出衆云月聻沙云這箇師僧却來就我覓月山拂袖歸衆云道我就他覓月師云這兩箇老凍儂頑處似牛皮爛處如壞絮雖然各有機關爭奈渾無展處只麼低頭懡㦬歸不知忘却來時路謝月首座瓊首座持雲巢語至上堂一止切一止一動一切動入荒田不揀信手拈來用昨日有人從西川來却得江東信說道趙州親見老南泉鎮州蘿蔔三斤重上堂摩騰入漢平地風波達磨西來重增殃禍是則是且道祖意教意是同是別川僧藞苴浙僧瀟灑上堂舉真淨示衆云頭陀石被莓苔褁擲筆峰遭薜荔纏羅漢院裏一年度三箇行者歸宗寺裏參退喫茶大衆會麼是大神呪是大明呪是無上呪是無等等呪能除一切苦真實不虗謝監寺齊首座秉拂上堂古者道於食等者諸法亦等諸法等者於食亦等如是則監寺施財首座施法所謂財法二施等無差別既無差別不妨以禪悅為味以法喜為樂各隨所宜各得受用各得充滿無有高下無有限量無有平等不平等者因什麼却道共寶器食飯色有異爭怪得別人道舊相訪上堂作者相逢你西我東水歸滄海月上孤峯放出城中老鼠咬殺村裏大蟲因甚如此閩蜀同風再住清凉上堂鼻繩拽脫上梅溪橫臥千峯適所宜豈謂業緣逃不得依前拽杞與牽犁如是則重玩故山風月再耕舊日田園不辭領破蹄穿豈憚拖泥帶水所以王老師道自小牧一頭水牯牛擬向溪東牧未免犯他國王水草擬向溪西牧亦未免犯他國王水草不如隨分納些些總不見得清凉有條攀條無條攀例既然如是且道作麼生是納些些底道理昨日