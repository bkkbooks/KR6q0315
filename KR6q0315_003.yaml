body:
  text: 小參結夏小參天高東南地傾西北一句全提乾坤黯黑三世諸佛望風斫額歷代祖師退後攢眉德山有棒無處施呈臨濟有喝亦須架閣清凉長老固是不知慚愧汝等諸人各自知時寒時寒殺熱時熱殺青絹扇子足風凉打刀須是邠州鐵然雖如是長期百二十日中期百日下期九十日又作麼生清平世界切忌訛言解制小參一夏為兄弟說話老翠巖落盡眉毛正因兩字不聞衲僧家大無慚愧清凉跛跛挈挈百醜千拙一夏祇與麼過實無可與諸人咂啖所幸諸人各自順時保愛略不相怪可謂上下相諳彼此省力然雖如是九十日中畢竟成得箇什麼冬瓜直儱侗瓠子曲彎彎冬夜小參羣陰剝盡向什麼處去也一陽復生又從何處來知得來處明得去處冬至寒食一百五籬邊石筍抽條長丈二鐵樹開花又生子直得寒山撫掌拾得呵呵釋迦老子鼻孔遼天樓至如來兩腳踏地惟有山僧拄杖子裂裂挈挈硬葛怛地直是不肯點頭却道我從賢劫來未嘗聞有這箇消息吽吽幸然平似鏡誰管曲如鈎歲夜小參年窮歲盡歲盡年窮東村王老夜燒錢張公喫酒李公醉不作世諦流布不作佛法商量硬似綿團軟如生鐵靈利漢子一踏踏著也是泗州人見大聖其或未然今歲今宵盡明年明日來結夏小參二千年前尺不如寸二千年後寸不如尺清凉到這裏眼不見為淨只將三文錢娶箇黑老婆長裙短袖拖泥帶水隈隈𣯧𣯧且恁麼過更誰管你結制解制長期短期殺生護生得念失念阿呵呵少林穿耳客元是老臊胡冬夜小參天寒人寒當機誰辨的風動幡動切忌亂針錐單明自己不了目前南北東西撞墻撞壁只了目前不明自己見聞知覺半醉半醒直須聲色頭上坐聲色頭上臥不為聲色所轉不為寒暑所遷一切處不留一切處成就方可隨緣度世任運過時寒則言寒熱則言熱飢餐渴飲間坐困眠不離塵中逍遙世外這箇猶是打淨潔毬子抱不哭孩兒只如時當亞歲節屆書雲敢問金色光明雲青色光明雲紅色光明雲紫色光明雲以手指云那邊是什麼雲良久云相顧眼睛俱定動可憐只解那斯祈歲夜小參法無去來無動轉相燈籠掛在露柱邊露柱掛在燈籠上一年三百六十日日日一般一日十二時時時一樣所以道是法住法位世間相常住至於風動塵起雲騰鳥飛夜暗晝明時遷歲改又有什麼過然雖如是爭奈新歲君與舊歲君兩人聞恁麼告報冷地不甘却向佛殿角頭互相耳語且道說箇什麼一年好處君須記三月江南啼鷓鴣結夏小參肉臭來蠅垛生招箭擬要完全却成兩片所以從門入者不是家珍流出𮌎中亦須吐却靈利漢不受人瞞向這裏擔得一片版去我當刎頸而謝若據見前一衆也有靈利不受人瞞底有則有敢問西天那蘭陀寺今日有幾人結制若也知得非惟不受人瞞便見此土西天絲毫無間若也不知清凉分明道破也要諸人共委乃云前三百後五百解夏小參以大圓覺為我伽藍癩馬繫枯樁身心安居平等性智黑牛臥死水更說休夏自恣取驗蠟人大似白日青天大開眼了說夢不見道家無白澤之圖必無如是妖怪所以衲僧家尋常蹉口道著佛字便須漱口三年不覺聞正因二字急急臨流洗耳是故山僧一夏九十日與諸人同行同坐同起同臥直是頂戴諸人不敢錯誤諸人一絲頭子分明恁麼道也是久日樺來唇冬夜小參正令全提十方坐斷放開一線滿路歌謠便見東家走過西家西家走過東家合掌擎拳互相慶賀道且喜一陽來復萬物重榮黃梅石女依舊生兒無角鐵牛安眠少室唯有擔版禪和幪頭打坐寒涕垂頤百不會百不知更誰管你四時八節八節四時卓拄杖一下云無孔鐵鎚解制小參拗折拄杖子盡大地是無孔鐵鎚解開布袋頭遍十方有通霄活路天台鴈蕩峩嵋五臺羅浮支提祝融五老腳頭腳底築著磕著東去也得西去也得不妨自由自在只是前途或有人問焦山今夏法道如何却不得妄通消息雖然焦山也瞞諸方不得諸方也瞞焦山不得且道因甚如此蘇州菱邵伯藕冬夜小參滴水滴凍渾無罅縫明眼衲僧失却鼻孔豈不見適來禪客問溈山至日垂問云仲冬嚴寒年年事運推移事若何仰山進前叉手而立點即不到溈云情知子答這話不得賊無種相鼓籠香嚴云某甲偏答得這話鼠口終無象牙溈山再理前話香嚴亦進前叉手而立到即不點溈云賴遇寂子不會休休著甚來由日從西去水東流幾人空白少年頭如今往事莫追只據見定與大衆相見拈拄杖云陽極陰生陰極陽生明中有暗暗中有明且道是何宗旨卓一下云參同契解制小參大地黑如漆古今無消息達磨老臊胡九年空面壁所以乳峯這裏不敢將晝作夜指東為西只有一味清水白米大家喫了聚頭一處打眠九十日中各自開眼做夢如今三期告滿聖制已圓且喜箇箇眼睛依舊烏律律地終不被別人瞎却然雖如是要且世尊三昧迦葉不知迦葉三昧阿難不知阿難三昧商那和修不知彼此三昧互相不知乃至今日見前一衆三昧亦乃互相不知惟是長老三昧想見諸人一時知了也遂撥胸云且道山僧有幾莖蓋膽毛良久未明三八九難辨力圍希冬夜小參初一初二引手摸鼻釋迦老子兩耳垂肩達磨大師當門無齒非不非是不是差之毫釐失之千里只這些子把定天下衲僧咽喉直是無處出氣拄杖子忍俊不禁咬牙噴齒出來通箇消息且要諸人知道運推移日南長至卓一下云九九元來八十二除夜小參翻袴作裩西天儘有指桑罵柳東土尤多是皆欺罔良民不顧彌天罪過殊不知年窮歲盡依舊孟春猶寒淡黃虀幸是清平長樂與麼告報瓜田納履未免嫌疑去却藥忌如何通信夜來遍地春風動開盡寒梅滿樹花結夏小參無上法王有大陀羅尼門名為圓覺拈拄杖卓一下云流出一切清淨真如菩提涅槃及波羅蜜乾屎橛麻三斤金圈栗蓬蒸餅䬪飥一時撒向諸人面前一任橫咬竪咬或有一箇半箇咬得破透得過乳峯鼻孔盡在諸人手裏且聽諸人橫拖倒拽若咬不破諸人鼻孔却在山僧手裏一夏九十日要去不得去要住不得住正當恁麼時又作麼生出氣卓拄杖一下云無雲生嶺上有月落波心解夏小參乳峯一衆具大闡提九十日夏夫復何為所謂四月十五日結也同住五無間獄於一切時游戲刀山劒樹碓搗磑磨開口悉吐黑烟舉意無非惡念惡念起時充塞虗空盡虗空之量不能容受如今七月十五日解也惡業已具證魔王身盡未來際永無退失如是則見前一衆今夏實不空過見前一衆既不空過燈籠露柱亦不空過山河大地草木叢林情與無情悉不空過至於拄杖子亦不空過拄杖子既不空過且道成得箇什麼通身黑漆粗刺梨非但登山兼打狗冬夜小參過去諸佛關空鎖夢見在諸佛寄帽投河未來諸佛望梅止渴大衆古今日月古今山河古今人倫古今節令汝等諸人各各含齒帶髮第一莫受人瞞如今有般漢才聞輕輕舉著便向這裏取次承當一向定將去合將去要且只知仲冬嚴寒孟夏漸熱殊不知孟夏漸熱仲冬嚴寒乳峯恁麼告報且道是瞞人自瞞為復別有長處良久云傾心吐膽無人會拔舌犁耕只自知解制小參拈拄杖示衆云看看十方世界若凡若聖情與無情盡向這裏安居結制一夏九十日今日告終其中所得法門所修行願各各不同所謂諸佛則具足一切種智其諸菩薩則成就波羅蜜門自餘有學無學這一隊不唧𠺕漢置而勿論只如見前一衆與山僧於此眉毛𤺊結一夏牙齒敲磕且道還有所得也無若有所得埋沒大衆若無所得辜負山僧正與麼時如何卓一下云西風一陳來落葉兩三片結制小參坐斷主人翁不落第二見一念萬年萬年一念便恁麼去百二十日夏未是長期其或未然鄮峯別有箇方便窮則變變則通盞子撲落地楪子成七八片卓拄杖一下解夏小參百二十日夏如今已告圓就中一句子切忌錯流傳衆中莫有通方底出來將錯就錯道一句看若也道得後園驢喫草若道不得秋至鴈㗸蘆冬夜小參六爻既窮陰魔自殄一陽來復吾道大亨洞山果子格外安排皓老布裩依前赫赤鄮峯寡不敵衆相逢相見隨例道箇仲冬嚴寒且要諸人順時保愛若據從頭數來灼然大有事在何故九九八十一窮漢受罪畢方始展腳眠蚊蟲獦蚤出救攝急急結夏小參風恬浪靜切忌嚲跟白日青天宜須退步鄮峯放一線道且與諸人恁麼商量忽然結却布袋頭直得山河大地變作山河大地吞却山河大地你衲僧家畢竟向甚處出氣拍禪床云無人知此意令我憶南泉解夏小參面門一思長時無間見成句子百味完全若論結也當處安居不是拽短就長至於解也隨方任運亦非拽長就短黃連甜甘草苦擲地金聲如糞土睦州拶折雲門腳南泉不打鹽官鼓卓拄杖一下冬夜小參諸佛不出世祖師不西來顢頇一句子南嶽對天台靈利漢不在商量性燥底何勞重舉只恁麼座著平地陸沉更擬進前藤蛇繞足豈不見玉泉皓老道運推移布裩赫赤不是不洗無來換替良久云古今爭戰干戈裏得到清平有幾人除夜小參舊歲今宵去去去實不去新年明日來來來實不來萬古長空無變異循環日月空相催山僧與麼告報衆中或有不甘底出來道大小育王話作兩橛又作麼生祇遣雖然如是也須真箇始得今時師僧往往語言相似州縣不同所以差之毫釐失之千里卓拄杖一下云誰識閻羅王是鬼結夏小參若據正令提綱直須寶幢路上荒草連天玉几峯前荊榛滿地猶未為分外而況三百五百聚頭接耳浩浩商量也大屈哉育王今夜事不獲已略借古人方便一路與諸人赴箇程限良久以大圓覺為我伽藍身心安居平等性智非不非是不是虎咬大蟲蛇吞鱉鼻雖然要且不得動著動著則打折你驢𦝫除夜小參無入作處可煞見成恰相當時全沒巴鼻鷲嶺妄傳迦葉少林謾付神光自餘列派分燈未免相屈辱只如今臘月三十日一箇箇豈不知是歲除夜更來這裏握節當𮌎側聽箇什麼山僧從而不識好惡更向諸人面前分拏劈裂也太無端何故彼此出家兒解制小參以大圓覺為我伽藍身心安居平等性智所謂從四月十五日結也如是至七月十五日解也如是威音王已前亦如是彌勒佛下生亦如是萬年一念一念萬年無古無今不變不異便恁麼去正坐在靈山窠臼中出頭不得有般漢便道衲僧家有甚固必要行便行要坐便坐鉢盂裏屙屎淨瓶中吐唾毀於佛謗於法不入衆數熏修十不善因成就五無間業若恁麼去又却墮在今時窠臼中未有超脫一路直饒恁麼不恁麼一時坐斷別有生涯點撿將來亦未可在何故又却墮在自己窠臼中轉身不得如今要出靈山窠臼則易要出今時窠臼則難要出今時窠臼則易要出自己窠臼則難既然如是且作麼生出得拈拄杖卓一下云靈山窠臼今時窠臼自己窠臼一擊粉碎了也到這裏合作麼生顧視左右云夜來何處火燒出古人墳結夏小參曹溪路上無端浪起成堆玉几峯前誰信地平如掌往復無間動靜一源伸出手觸著達磨大師眼睛舉起步踏斷釋迦老子鼻孔了無回避逈絶安排更說甚麼長期短期只貴自家心肯意肯既然如是只如九十日中畢竟作麼生履踐拄杖生根休用剪鉢盂無柄不勞安解夏小參機不離位沉乎醉鄉語不離窠滯在金網竪起拄杖云看看賓頭盧尊者現在山僧拄杖頭上為諸人作自恣佛事廣說一夏九十日內所得所證法門所修所行行願人人具足彼彼無差直得西天那蘭陀寺諸佛弟子悉皆聞已莫不合掌贊善嘆未曾有唯你這一隊漢有若持水納石恬不為事既無奈何處却入摩利支山去也結夏小參十方同聚會作麼生箇箇學無為有甚間工夫此是選佛場賺殺人心空及第歸且在三門外山僧恁麼告報且道節文在什麼處諸人還知麼草本天下同解夏小參拈拄杖示衆云超然獨證未免誵訛卓爾見前猶存顧鑒須是擘開布袋口突出拄杖頭得失兩忘是非俱泯一切智智清淨無二無二分無別無斷故文殊普賢竪起拄杖云總向這裏作自恣佛事且道觀世音菩薩在什麼處卓一下云莫向聞時認不聞出隊至道場冬夜頭首秉拂罷請小參便恁麼委得已是落二落三了也儻或躊躇不免借主人威光赴箇時節拈拄杖云見成公案不涉安排竪去橫來總由這裏天地以之覆載日月以之運行四時以之代謝萬物以之敷榮卓一下云羣陰既剝衆魔已殄又卓一下云一陽來復吾道大亨直得伏虎尊者忍俊不禁將國一祖師背一拍呵呵大笑云慚愧慚愧風以時雨以時蘇湖熟天下足東家西家總是王老師檀越且道到這裏如何教化卓一下云須是堂頭師叔始得結夏小參一撥便轉猶涉程途三搭不回故難持論豈不見廣額屠兒放下屠刀道我是千佛一數障蔽魔王道待一切衆生成佛盡衆生界空乃至無有衆生名字我乃發菩提心直饒恁麼刺腦入膠盆你這一隊漢更來這裏聚頭合火道我禁足安居克期取證且擬證箇什麼皮下還有血麼以拂子擊禪牀一下云夜深歸去便歸去莫待天明失却雞冬夜小參當頭坐斷凍鎖寒潭覿面提持暖回幽谷竪起拂子云看看神應龍王與國一祖師互相慶賀且喜一陽來復吾道大亨雙徑山中樓殿又見重新十字街頭米鹽依前舊價這箇則且置祇如俱𦙁道者將盤陀石一喝直得七花八裂為復是神通妙用為復是法爾如然良久云北斗東轉南斗西移結夏小參心外無法法外無心言發非聲色前不物才開口觸著空王祖諱擬動步踏斷彌勒腳跟頭頭總是生涯處處無非妙用所以道以大圓覺為我伽藍身心安居平等性智咄曹溪門下切忌俗談解夏小參將心用心重增過咎以智遣智轉見病深所以道家無白澤之圖必無如是妖孽厨乏聚蠅之糝自然永絶饑虗山僧一夏出出入入略無一語與諸人相資相益然好一釜羮且道其中還著得鼠糞麼良久云噁今夜無端打落兩顆冬夜小參土木場中過兩冬朝匆匆兮暮匆匆從來業識無憑據說甚東山大脫空直得無禪可參無道可學四海禪流何處棲泊含暉亭上望東溟凌霄峰頭揖南嶽翻笑老龍牙手裏把柄破木杓除夜小參瞿曇出世弄假像真達磨西來多虗少實自餘顯大機彰大用玩弄神變馳騁詞鋒逗到臘月三十日也只是箇歲除夜徑山與麼告報莫有長處麼以拂子擊禪牀云堪作什麼結夏小參無奈何處狗䑛油鐺絶伎倆時猫兒見直得眼不掛戶意不停玄舉步迷蹤轉喉觸諱不知大盡小盡說甚長期短期世事紛紜日月忙一身儱侗乾坤窄正恁麼時且道還有出身處也無良久云有功無功莫使腹空解夏小參言無展事語不投機承言者喪滯句者迷南斗七北斗八廬山羅漢院一年度三箇行者徑山寺裏每日兩粥一齊是汝諸人九十日內捧鉢盂向長連牀上恣意咂啖於中還有知飽底麼通身是飯通身水問著癡頑總不知解夏小參僧問選佛場開日藂林氣象新心空及第者畢竟是何人師云只有你一箇不是進云佛鑑禪師聻師云我亦不是進云恁麼則大家隨處樂升平師云老僧與上座不同進云昔日溈山坐次仰山香嚴侍立溈山云如今總恁麼者少不恁麼者多時如何師云鈎頭有餌進云仰山從東過西又作麼生師云一釣便上進云香嚴從西過東聻師云同坑無異土進云仰山香嚴恁麼祗對還契溈山意也無師云料掉沒交涉進云溈山道這箇因緣三十年後擲地作金聲去又且如何師云不中餵狗進云仰山云這箇須是和尚提唱始得師云不是好心進云香嚴云即今亦不少師云喪盡家門進云溈山云合取狗口是肯他不肯他師云蘇州菱邵伯藕進云溈山有如是指示今日見前大衆侍立徑山有何指示師云飢則喫飯困則打眠僧禮拜乃云打開布袋口擊碎鐵門關是凡是聖不妨北往南來左之右之自然七穿八穴說到行不到處行到說不到時吹毛在握凜凜神威寶鑑當軒澄澄光彩萬法豈能為擾千聖不與同廛揑定寰中特標象外正恁麼時文殊三處度夏即不問至諸佛集處因甚出女人定不得小處多官府空山有鬼神結夏小參集方儲藥病者愈多剖㪷折衡爭端益盛恁麼也不得不恁麼也不得恁麼不恁麼總不得然後徑山與諸人向沒交涉處同此受用同此安居忘彼忘此非實非虗二時粥飯氣力粗試問諸人會也無除夜小參舊歲即新歲新年即舊年要知新歲歲元是舊年年到這裏添一銖則稱尾軒昂減一毫則尺頭短促須是從空放下當處平和自然律氣潛通暖生幽谷萬物獻敷榮之態元樞忘煦育之功水月無心風雲自異正恁麼時如何路不拾遺真古道民皆樂業見豐年結夏小參言超情謂理絶正偏碓搗東南磨推西北渾崙無縫罅平坦沒誵訛三世諸佛橫說竪說謾逞詞鋒歷代祖師全提半提妄生節目是汝諸人九十日內十二時中如何趣入如何履踐如何受用竪拂子云若向這裏會得許你融十虗於毫端置塵劫於當念時時禁足處處安居腳頭腳底七穿八穴其忽未然佛殿裏隔子門礙塞殺人解夏小參江南兩浙春寒秋熱塵沙劫事在如今如今不異塵沙劫恁麼見得諸人九十日內常在家中未嘗不與山僧同出同入山僧九十日內奔走於外未嘗不與諸人同起同倒不見有纖毫彼我之相亦不見有纖毫離合之蹤豁爾虗融逈然獨脫雖然如是且道山僧在長安城裏喚你諸人諸人在五峯頂上還應得也無若也應得如上所說悉皆不妄其或未然帶纍山僧拔舌犁耕無有休日冬夜小參寒來暑往箇片田地何曾動搖鼓寂鐘停一會靈山儼然未散恁麼會得便見善財童子不離本位入普賢毛孔剎中經歷無量國土承事諸佛參禮知識一期事畢却來徑山面前鞠躬而立合掌白曰今當書雲令節天下叢林於此時興大佛事或拈洞山果子或提皓老布裩或舉趙州茶或示雲門餅浩浩商量不妨閙熱惟是此間冷啾啾空索索聞無所聞得無所得未審師意如何咄豈不見道朕聞上古其風朴略除夜小參光景匆匆若逝川舊年去了又新年年來年去自來去底事何曾有變遷與麼會得今年也與麼明年也與麼後年更後年乃至百千萬億年也只與麼與麼與麼是汝諸人還曾見有不遷變底道理麼葉生春樹秋歸土日出東方夜落西結夏小參六合九有情與無情竪拂子云總在這裏安居禁足徑山令下不許妄行一步不得妄說一句說須說到行不到處行須行到說不到處說不到處如何行須是無足人始得行不到處如何說須是無舌人始得若說得一句千句萬句句句朝宗若行得一步千步萬步步步踏實且如何是踏實底道理乃云明眼人落井除夜小參從上佛祖的的相承列派分枝遍天遍地子細看來無非一人瞞一人互相熱瞞而已然雖如是又須是真個瞞得過始得若只解瞞人不能自瞞此人有手無眼若只自瞞得過不能瞞人此人有眼無手若也自瞞得過亦能瞞人敢保是人手眼俱備如處晴晝見種種物隨手取與無所疑滯自然不為寒暑所遷及時令所轉又不妨見人賀冬也賀冬見人賀歲也賀歲要且覓他一絲毫起處了不可得到得恁麼田地方許你說大脫空行無間行無間行則且止如何是大脫空良久云一年三百六十日臘月盡是歲除夜結夏小參一物不為藥嶠早成多事無言可對仰山已涉繁詞去却藥忌如何通箇消息孟夏漸熱仲夏極熱子規枝上一聲聲分明啼破三更月諸人還猛省麼百丈耳聾黃蘗吐舌冬夜小參趙州南石橋北松根有茯苓去却一拈得七龍門無宿客信手拈來信手便擲隨處破蕩隨處成家卷舒逆順左之右之南北東西無可不可此猶是尋常用底只如一陽未生如何通信以拂子擊禪牀云京師出大黃結夏小參三世諸佛說夢歷代祖師說夢天下老和尚說夢徑山昨夜亦得一夢夢遊圓覺大伽藍中時主持者空王如來適當結制鳴鼓升堂為諸大衆說安居偈護生須是殺殺盡始安居會得箇中意鐵船水上浮是諸大衆悉皆默然受教於中一人聞說是偈得未曾有於是起大精進發大勇猛秉智慧劒一往直前不問佛之與魔凡之與聖有學無學情與無情一切皆殺殺一切已然後自斷其首首已斷故無能斷者是諸大衆見是事已皆證無生徑山隨後歡喜踊躍於踊躍中忽然省覺細詳前事謂是虗耶實耶謂是有耶無耶謂是夢耶覺耶若謂是夢覺者是誰若謂是覺因何有夢我此衆中必有智者有則出來為我原看若也原得許你與溈仰父子畬田種粟夜𥨊晝餐捧水擎茶不妨神通遊戲其或未然鐵船水上浮莫道不疑好解制小參我宗無語句亦無一法與人只貴各人自己鼻孔端直而已黃面老漢缺齒胡僧猶自喎斜所以山僧一夏費盡手腳與諸人整頓因甚到夜不正忽有箇漢出來道老和尚且莫口吧吧地只你鼻孔猶缺半邊在何不以手自摸索看遂以手摸鼻云噁龍蛇易辨衲子難瞞結制小參人人有一片田地自古自今未嘗變易無端被從上乃佛乃祖前後出興互相指占各立門戶或說直指單傳或說克期取證強生節目疑誤後人殊不知進一步犯著李四桑園退一步侵他張三麻地不進不退這裏一踏踏著腳跟下硬紏紏地元是自家本業更不用他人作保不妨於中隨時受用騰騰任運任運騰騰居不知所為行不知所之與物委蛇而同其波阿呵呵喚不回頭爭奈何為雪竇無相和尚對靈小參大用全提乾坤黯黑大機獨運剎海齊彰行一步象王回旋出一言獅子踞地了無枝葉不近人情逆順卷舒縱橫得妙此猶是無相賢屬禪師平常用底且道葉落歸根如何通信雲淨八紘無覓處乳峯高插暮天寒復舉僧問黃龍機禪師云和尚百年後鉢袋子什麼人得龍云一任將去僧云裏面事如何龍云線綻方知師拈云黃龍老漢口頭不吝肚裏猶慳爭如無相鉢袋子不待百年後未死已前一時擘破了也若說裏面事人人盡知且道知底事作麼生洞視索空無可有從教千古錯流傳為淨慈北澗和尚對靈小參大海乾枯虗空迸裂突然於中産此英傑弃儒服著佛衣說佛非恣儒舌戲笑怒罵為佛事超然不守於途轍橫說豎說巧說直說浩浩然流布於人間不知幾千萬言如塵如沙如金如玉如長江之波如霽天之月而使四方學者莫知其為儒耶其為釋耶是故有口如啞有舌如結不可得而擬議不可得而分別今既已矣令人慟哭流涕而今而後不復見此明教師甘露滅正恁麼時徑山如何剖決拍禪牀云安得鸞膠續斷弦打刀須是邠州鐵復舉僧問長沙南泉遷化向什麼處去沙云東家作驢西家作馬僧云意旨如何沙云要騎便騎要下便下師拈云諸人要知端的麼風流儒雅佛鑑禪師法語示惠侍者前住能仁文彩未彰已前有一句子不橫不竪突兀地自古自今乃佛乃祖競頭出世肆口宣揚未曾有一人當頭道著四海禪流瞻風撥草擇友尋師傍窺暗覷終未有一人驀直覷透然覷不透處唯在鼻尖頭道不著時不離唇皮上若向鼻尖頭唇皮上討則千里萬里沒交涉也的的此事要箇爽拔俊快底漢擔荷至擔荷處實無毫髮許擔荷底道理所以迦文老漢於然燈所無一法可得而得受記二祖覔心了不可得處而心安然逗到呈袋時唯禮三拜依位而立便有得髓底一杓惡水有祖以來東西繩繩針砭相資水乳投合大非容易又不見國師一日三喚侍者侍者三度應諾這裏又容得毫髮許道理麼後來有不識好惡底漢於無道理中強出道理云譬如暗中書字字雖不成文彩已彰且莫說夢如今未彰已彰置之莫論只如國師道將謂吾辜負汝元來汝辜負吾且道有辜負耶無辜負耶若有辜負那裏是他辜負處若無辜負國師因甚與麼道須知明眼衲僧到這裏直是有氣無出處惠侍者本色英俊歲久相從善能體理鼻頭既有通天竅試為山僧出氣看示心侍者前住馬溪從上知識競頭出世提持箇事張羅布網接上上根器鞠其要妙不出乎發明各各自心而已此心既明只這明字亦無著處有若紅爐上一點雪相似逗到恁麼田地更資悠久煉磨至於純熟根本既固枝條花葉不愁不茂方可臨大事當大任死生禍福之際纖粟不能動搖逆順卷舒一動一靜靡不中的與其動也應變靈通圓融無際與其靜也虗明獨耀不為勝妙境界之所桎梏所謂一切時一切處皆吾活業自然游刃有餘地矣心侍者真英俊衲子相從既久告別寧親勢不可遏然通方道人或歸去或再來初無固必昔香林遠侍者歸蜀潛光匿耀於青城水晶宮初不欲人知其後臭煙蓬悖不容掩藏竟大雲門之門豈小小哉此真良範心宜勉之示光首座住福林從上來的的相承底非陰界中事莫不以心傳心以器傳器是須羽毛特異乃可付授如虎之有彪返睨其母不守窟宅哮吼吒沙始得絶類離倫超越格量不見道不是河南便是河北至索火處豈徇塗轍者之所能及而後益張吾宗擘開太華逗出黃河有何疑滯其道至今浩而不泯豈小小耶光首座乳峯玉几至於茲山首尾相從將十載許中間有克由叵耐處固難備舉惟是分座說法卷舒游刃豫切私喜今腥香發露不可掩藏出應福林之請雖未稱設施然道無方所行之在我如不負所囑其於臨濟豈復多讓又何啻遇大風則止者哉示覺長老的的箇事須還他挺特沒量漢奮不顧身直拔擔荷才涉廉纖則撞頭入魍魎魑魅隊中卒無解脫之日豈不見道俊狗不露牙擬不擬便著從上來唯德山臨濟羅山明招趙睦二州雲門輩頗似箇體才其餘根器有利鈍得之有深淺矣至於極處固無二致而其用處有妙不妙耳大凡入箇門戶不可草草須得根本正當腳下牢實然後養育成就擴而充之不得已而隨緣應世操佛祖柄開鑿人天要須不近人情是與不是盡與裂下只貴獨脫當頭契證而已不將實法繫綴於人擬與麼便不與麼是句亦剗非句亦剗才有所重便成窠臼瞎學者眼不是細事可不謹哉覺長老相從甚久於道深有趣向霜露果熟出應人天之請求語為警因掇筆書以贈切宜勉之示寧侍者見住靈巖寧侍者自育王雙徑首尾相從已經數載見其孜孜為道真本色衲子秋風吹衣忽來告別且袖紙求語而謁蔣山吾不欲特地固却之而所請益堅因謂之曰昔應庵據鍾阜大慧居五峯一時龍象往來二開士之門憧憧交武於道又不知誤了多少人家男女吾固不敢仰視前輩而癡絶兄實當世宗匠此行若空去後必實回若使實去必須空回斷無疑矣忽恐問著此間如何若何却不得妄通消息何故彼此老大示南藏主昔周金剛弘大經論名震西蜀而不信禪家有直指之要以謂南方魔子吾當倒其巢穴摟其種類免使鼓閧於人遂負疏鈔憤志南來豈謂持守不堅至中途買點心處觸於邪毒遂生迷悶沒理會處急登龍潭欲求解救之方殊不知撞頭深入魔宮竟為大魔所攝向吹滅紙燭處喪却平生便作魔語云窮諸玄辨若一毫置於太虗竭世樞機似一滴投於巨壑魔作益熾於是焚却疏鈔至於拆却佛殿而後但持一白棒佛來也打祖來也打又云未曾打著箇獨脫底要且不知他末上先自粘手綴腳了也却要打著箇獨脫底不亦難乎南藏主親從大慈雨花筵中來遍歷諸方而於老僧相從最久其憤憤之志較之德山亦不少讓萬里泝流後日若見獨脫底當與德山痛出一口氣示湛上人學道無過兩種病若不滯在澄澄湛湛中便在紛紛擾擾處猛烈漢痛與擺撥騰身一躑透過那邊非但彼我聲色能所俱亡求其生死朕兆了不可得方謂之大休大歇大安樂絶學無為間道人也到得恁麼田地猶只名自悟自了底人若論蜀之三十六江前頭大有灘在切宜勉之示湛然道士服有緇黃道無彼我如果能弘道則不見有緇黃彼我之相直下湛然清淨豁同太虗包容一切便見山河大地人畜草芥莫不因茲而立如是則非特超聖凡出生死至於亘百千萬億劫不動不變亦只恁麼所以古人道不出是又道莫過於此要且不得認箇是執箇此認著執著則禍生也須參活句莫參死句他得底人宛爾不同十二時中只麼間間地蕩蕩地如珠在盤觸著便轉不留影迹方得名為通變道人然後隨機應用轉化同事度所未度挈一切人同遊虗無安樂之地豈不偉歟然更須知有衲僧門下沒巴鼻一著子你且道這一著子灼然是有耶是無耶有則達磨大師無板齒無則老君頭戴楮皮冠然高士宿有靈骨深疑此事偕其徒立上人奮志南詢遍見知識朅來鄮峯眉毛𤺊結孜孜不少怠忽中夏錯認橘皮作火克由叵耐臨別炷香求語為證育王雖有三十棒未欲下手後五日或能再來老夫當不惜也示彬典座受牒正覺我宗無語句亦無一法與人這裏只貴箇眼橫鼻直底漢不涉廉纖不行理路直下頓領然後隨分著衣喫飯任運過時如是則非但世間名聞利養得喪是非不能干其懷縱有出世間殊勝又殊勝底法亦無心顧著長時只麼間間地蕩蕩地不依倚一物長養成就立處孤危自然用處峭拔等間靠著莫教略露些子便乃坐斷天下人舌頭縱饒佛祖亦無奈何處雖然正覺山頭古有十二松更須一一點過一株不見便是不了事祝祝示日本然上人我有一句子未離日本未跨船舷時已是兩手分付了也這裏劄得腳便見大唐國裏無禪師儻或遲疑更要進前叉手道箇咨和尚老僧不免向淨潔紙上重新塗糊去也所以道無南北弘之在人果能弘道則一切處總是受用處不動本際而遍歷南方不涉外求而普參知識如是則非獨此國彼國不隔絲毫至於及盡無邊香水海那邊更那邊猶指諸掌耳此吾心之常分非假於他術然上人如是信得及則逾海越漠涉嶺登山初不惡矣示清藏主本色道流決欲究明此一段大事非陰界中逐旋扭揑逐旋安排不二不四活計是須天姿爽拔志願堅確從跂步時便有吞佛吞祖之量不與千聖並立底氣槩不拘得失不顧危亡只向未扃已前咬牙嚙齒直下頓悟頓證不留纖粟如獅子兒哮吼一聲壁立萬仞又如烈火觸著便燒不容近傍正恁麼時非但蕩去一切知見解礙至於求絲毫頭佛法亦不可得却向絲毫不可得處拈出一絲毫揭示未學轉化未化轉度未度豈不是大丈夫成就大丈夫事業耶所以周金剛未出峽時𡎺一肚皮骨董充塞乎八萬四千毛孔匝匝地誰奈其何及見龍潭輕輕點發便乃到底翻轉和根拔却向青天白日中撑開兩眼突出一條白棒佛來也打祖來也打超然獨立如雷如霆震驚寰宇浩浩轟轟至今未泯豈小小哉清藏主本色道流昔常爛遊大慈講席深知非究竟學於是焚舟南來相從於乳峯力究此事憤憤之志其於德山不復多讓臨別炷香袖紙求語因書此段葛藤壯之當如老德山發明獨脫底一解子以救末運異見邪解之疾其他非所望也示瑜上人至道無難惟嫌揀擇但莫憎愛洞然明白若端的一到明白之地無有絲毫揀擇之心亦不見有絲毫憎愛之相廓然蕩豁如大虗空無所障礙然更須知有老僧不在明白裏有般漢不識好惡便乃踏步向前却問既不在明白裏又在什麼處似此參究驢年也未夢見在若是俊底鑑在機先領於意外八面玲瓏逈然獨脫又更有什麼在與不在明與不明底事耶瑜上人天姿淳雅萬里南來尋訪知識孜孜於道久而不變鄉信忽通遽有歸寧之行臨別求語以為警䇿祝之曰決欲捉敗趙州切不得向山僧言下尋討示求堅上人道在日用若滯在日用處則認賊為子若離日用別討生涯則是撥波求水這裏絲毫及不盡便成滲漏十二時中觸途成滯殷殷似有一物頓在𮌎中如受鬼胎未能分解豈可自寬所以古者探究箇事大不容易莫非畢生盡世確志堅忍須得一到大休大歇大安樂地方為究竟有若架千鈞之弩除是不發發則鐵鼓九重俱透然後於六句外受用了無一法可得不與千聖並行方為灑灑落落真正了事衲僧也其或不然更向老僧語下咂啖則成相負纍矣堅上人宜痛思之示超如二上人古者道密在汝邊妙在轉處誠哉若轉不得動為一切物刺著眼盵瞪地擺撥不下如衣壞絮處荊棘林輕輕轉側即便惹絆不得自在若是箇脫灑漢他自不同十二時中𮌎次間間地蕩蕩地不為佛法禪道玄妙語言之所籠而於語言三昧海中不妨遊戲所以因言顯道因道立言有何是非得失於其間哉超如二上人真廣南蠻無佛性者頃嘗相從於育王今既旋鄉告別於雙徑廨院且將從上佛祖痛處恣意扭揑呈露於老夫之前因思古人索鎮海明珠直得無言可對無理可伸將古較今何啻傾出一栲栳無準有棒未暇打得候再出嶺來却得分付二上人還甘麼示受業覺上人動即影現覺即冰生不動不覺翻身一躑抹過那邊更那邊不復回頭顧著始得離倫拔萃名為脫灑道人儻或趦趄未免墮在鬼域中而為魑魅魍魎無有出離之日須知此事實無奇特玄妙要且只是洛陽溪裏有箇普豐院相似若是其中人舉著便知落處老拙自幼出家十八上行腳到處橫草不拈豎草不把如今五十三也依舊只是舊時人初無奇特玄妙吾姪自乳峯玉几五年相從豈不知之如今臨別反持即庵賢屬法語一軸相呈欲老拙復書一段於其前以為助道之要何其特地耶因見其誠意切切於是信筆一揮不覺盈紙是則是且道還有一箇元字腳麼試點撿看若言有則埋沒吾姪若言無則辜負老僧這裏撥得開所謂金剛圈栗棘蓬吞透有暇矣其或不然更為下箇注腳紹定己丑中秋後五日阿育王山無準叟書于無異堂示溥塔主世學一伎一能若不得其要妙則成常習非伎能也況學道乎然學道是須得其綱領要妙不爾則成口耳傳授流入名相終成戲論耳昔五祖少遊大慈學海善發鈎深之問衆皆忌之及盡教理知其不為究竟於是捨而南來已半百矣一見白雲倒底脫去空拳索手別立生涯向佛祖提不到處拈出沒巴鼻一著子世莫能辨皆目之為演山主其可見也而後傑出三佛諸大弟子摐然密布於四方其道大振至今繩繩不絶皆其兒孫於宗乘豈小補哉原其所蘊錦心繡腸不為不無以世俗鄙俚之語發明至要說略規模調高韻古誠難擬議所謂耆婆死百草皆泣是地溥塔主真其的的鄉人當痛省而深慕之則直指之道光明有在矣梁王寺捺塗田求語香水海底有一片膏腴田不知幾千萬頃往昔威音王傳授與毗婆尸七傳而至迦文老漢展轉相承到胡達磨達磨不守家業將白契逾海越漠欲賤賣與梁王梁王知其意不臧故不納只得恓恓渡江直至少林九年努觜神光不忍見折一臂以易之而後子孫既繁中間有不納官稅冒姓名佃之者多矣年來往往墮於農事遂至湮沒良可嘆惜今杲澤二上人憤氣不甘復欲追還舊觀如果確其志則洪波險處白浪堆中試著工夫看或不犯鍬钁等間翻得轉則非但梁王一衆饜飽有餘至於憧憧往來悉皆饜飽二上人宜勉之吾說不虗示曇上人號竺源瞿曇昔起禍於竺乾尋波流於震旦如決河源注而為海令一切魚龍蝦蟹游泳其中悉知以水為命升騰變化者不可以數計適此季運昧其源者多徇其流者衆往往甘抱焦渴奔逐陽焰欲求所濟竟乾死於滄溟之側良可痛惜錦官曇上人智識超然始若不類萬里南詢欲以折筯探其浩渺偶不著便誤霑一滴於一滴中窮盡瀛渤之味徹見乎一漚未發之前盡於尾閭之極真瞿曇敗家種草也東湖率庵一見喜而賊之以竺源吾弟即庵從而肆其惡江湖道舊異口同音呪詛唾罵殆無措身之處於是不得已而理舟西泝相從久之且欲求語固知其勢將不利於蜀矣吾亦無如之何臨岐謾祝之曰行矣善為方便示仁上人道不可求貴在歇心而已然此之一歇不可強也須假朝求暮討至意路絶處忽然自歇一歇之後馳求之心悉皆止息有如途路旅泊之人欲詣其所力在乎行非行不能到一到之後伶俜辛苦等事悉皆止息無復奔走豈不見善財歷五十三參至彈指處樓閣門開入已還閉從前所得法門所見境界悉如夢幻至於有見桃花而絶疑慮聞擊竹而忘所知要且不在桃花上亦不在擊竹邊畢竟在什麼處本色道流急須著眼仁上人相從且久告別泝流炷香求語以為道伴且有再南之約然初無固必莫非任緣而已但令一切處無第二人一切時無第二念不變不動則無時不聚首也行矣勉之示徹上人蓬山徹上人冲虗菴之孫萬里南詢遍見知識孜孜切切略不少怠真本色道流也朅來鄮峯相從數載逮移凌霄樂然偕行五峯在天之表一塵不到實古今有道者集大成之地徹亦自喜秋風西來鄉信忽通遽告歸寧義不可免炷香求語併記再南之約復出示清節老人疇昔送行及招歸二篇其略曰事須莫學虗頭禪晝參夜請求真實然真實亦不可求也求而得之亦虗頭耳弃虗頭捨真實究竟底事如何體悉行者磨墨山僧走筆寫護身符五月五日示周司戶某稔聞德望有日但未遂一見為快茲沐真染殊慰此心又蒙不鄙特以此段大事因緣相期於形骸之外附到瓣香素軸欲索數語以為日用助道之資自知林泉野人固不當眩曜知見於名公巨卿之前然既出誠意切切亦不得不以誠意相告但此事不從他得只是人人腳跟下本有底一段事歷歷孤明亘古亘今不動不變才擬心相向便是千里萬里沒交涉所貴當仁直下諦信不越一念超然獨脫頓悟頓證至證悟處實無一法可得只是舊時周司戶而已若別有所證則心外有法乃成外道矣今時士大夫不是不聰明不是不靈利只緣以聰明靈利去冥合箇事返為靈利所惑不見本法要須離心意識參出凡聖路學才有一絲頭便與剪斷縱有奇特更奇特玄妙更玄妙底事亦與一時裂下至無棲泊處略整頓精神冷眼諦觀鼎鼎是什麼道理稍覺煩悶無入作處却不得放捨只就這裏緊靠著抵死與之作頭底不知不覺忽然洗面摸著鼻孔自笑一回方知道無生死可出無佛法可求釋迦老子是箇黃面漢達磨大師是箇老臊胡一大藏教是甚破故紙至於百千法門無量妙義莫不從風而靡回省前來憤憤悱悱咬牙奮齒必定慚惶無地也寫至此更欲列陳數段古人因緣以盡斯軸忽思來書所謂非事葛藤塗糊後人之語不覺撫案擲筆于地雖然已是葛藤不少示鑑侍者鑑侍者英俊者流憤志南來決明己事始相從於玉几而至五峯首尾數年略不少怠良可喜也秋風襲衣遽起歸歟之興柏庭友于賡歌以壯其行無下數十篇且呈無準老叟因謂曰一吟一詠如㭊旃檀片片皆香然於中有意到句不到有句到意不到有意句俱到者語未竟鑑袖出小軸趨前而言曰意句俱不到處願求一語豫罹劫火自夏及秋奔走紅塵有口無取氣處何暇及此鑑請之益勤不得已而為之姑紀歲月時紹定癸巳八月十八日是日也錢塘之潮大於常年觀者如堵迎潮之人莫知其數出沒往來等兒戲耳中間也有出不得者何故不見道弄潮須是弄潮人示垠侍者學道如世巨商經涉大海渺無涯際始須假舟楫勤櫓棹及其到也只在須臾正恁麼時回視前來所用功力一時俱息當下自然穩貼貼地奇珍異寶悉皆現前方是自家元物然後周貧濟乏隨意運用不由別人豈不見昔日善財遊百一十城參五十三善知識一一善知識各得其法門要且終有限量後於彌勒彈指聲中入大樓閣頓忘前證本智現前方名無限量法門方名得大自在受用當時善財若不得這一解亦只贏得腳板闊矣垠侍者萬里南來遊歷江湖想所見知識亦不少矣其於所證却須超過善財一頭地乃善示升上人長老小師不參禪講主徒弟不聽教如忽真箇不參不聽直下踏著瞿曇未生時腳跟摸著達磨未來時鼻孔併將二老胡縛作一束倒卓放尿塌下豈不是挺特丈夫儻或泥迹循言準前打入骨董袋裏無有擺脫之期也嘉定升上人乃能仁清溪上足訪豫于徑山趨前而言曰自離師日告以欲參鍾山又參雙徑已蒙癡絶和尚示以法語佩服其教不敢少怠袖紙炷香復欲老僧助拳因謂之曰子合喫六十棒舍汝師而他求合喫二十棒又受鍾山塗糊合喫二十棒今到老僧處猶更云云不已合喫二十棒適值拄杖不在併送歸能仁行遣後忽自知痛癢吾三人皆犯突吉羅罪示月上人學者始入道如月初生曲彎彎地及至望則彌滿清淨光遍十方無幽不燭然尚墮在光影裏坐在法身邊未得透脫一路所以却從十六夜去漸漸消磨至於晦如未生時無異當恁麼時說與人不得呈似人不得只可自知若絲毫許及不盡便成滲漏列在下風向人背後叉手若是上上根器則不在此限豈不見古靈行腳歸師問曰汝出游方學得幾許佛法靈云一似當初未去時噁開口便作屎臭氣月上人相從甚久切切於道殊可尚今以有師有父在堂意欲歸省且炷香求語為別從而謂之曰子歸與師相見時儻或問著如何若何第一不得學古靈亂呈懞袋恐其效德山行事則併吾此軸俱為拭不淨故紙耳示寧藏主語是誑默是謗語默向上別有一竅從上佛祖未嘗敢以正眼覷著德山臨濟雖盡力提掇要且只在左邊立以手指點而已正定處亦未嘗動著一絲頭若欲真實擔荷是須向胞胎未具時究取始得不爾縱學得盛水不漏未免離家失業灼然箇事大難承當寫至此寧一見便喝云住住我未離嘉定時已知大佛坐在九頂山中直至如今轉身不得只你這老漢口裏水漉漉地敢保亦未徹在噫三十年弄馬騎今日被驢撲示垕上人古宿道諸方說禪浩浩地爭似我這裏種田博飯喫雖則軟郎當地看來較之巨靈擘太華之威猶未猛也又有聞版聲呵呵大笑及乎編辟將來卻言肚飢於是乎喜此又何曾恣騁驢唇亂呈懞袋耶今時參究往往不本源由動輒撒屎撒尿良可哂也垕上人本色衲子必不雷同見此快以糞箕笤用事乃可示湘監寺湘監寺乃石田師兄上足捨其師而從吾游多歷年所始歸侍司後歸庫司人或曰湘爽拔非籠檻中物以豫為誤豫曰昔楊岐輔慈明振汾陽之道迫慈明晚參此亦一小節也而後應世時曰會監寺也會禪非特一時不知之至於翠巖有曰慈明佛法如一隻船前則大寧中則黃龍後自稱而已而不言楊岐是亦不知之耶是不可容易而擬之耶而後續臨際正統繩繩不泯者又豈以清濁為纍哉所謂不知則為誠不妄也湘當知人不知未為極仍須至自不知乃善示燈禪客燈禪客乃法戰場中宿將也大凡出場定當箇事須是七事隨身韜略俱備臨時布置意句著著有出身之路頭頭具生殺之機或背手彎弓或單刀直入或迎鋒破的或詐敗拖旗所以有擔擎有借事有心行有編辟才手蹉腳跌則性命落在別人手裏燈真差其要者故能全身遠害臨陳對壘諸方老作往往無奈其何而於徑山面前猶敢干戈相待乃持此軸低情下顏趨前而曰久依嚴帳中從前器械皆使不著今就師處別請一箇問頭隨應之曰併却咽喉唇吻置將一問來示小師德通禪客德通吾子中不肖者侍吾最久而嘗病其口多每欲卸下衲衣痛與一頓既默識吾意遂作廬嶽游是避此而逃矣又敢卑辭願求一語為途中自警恭而無禮尤為叵耐然嗔拳不打笑面於是引筆而謂之曰既往宜早歸吾晚年雖不澡浴要子洗腳無爽吾祝示日本爾侍者住東福道無南北弘此在人果能弘道則一切處㹅是受用處不動本際而歷遍南方不涉尋求而普參知識如是則非特此國彼國不隔絲毫至於及盡無邊香水海那邊更那邊猶指諸掌耳此吾心之常分非假於它術如此信得及見得徹則逾海越漠陟嶺登山初不惡矣爾侍者俲善財遊歷百城參尋知識決明己躬大事其志不淺炷香求語故書此以示之
